<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training">
<meta name="theme-color" content="#0e0b08">
<title>Training Log</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230e0b08'/%3E%3Ctext x='50' y='68' font-size='60' text-anchor='middle' fill='%23d4a574' font-family='sans-serif' font-weight='700'%3E%E2%97%A2%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' fill='%230e0b08' rx='36'/%3E%3Ctext x='90' y='122' font-size='108' text-anchor='middle' fill='%23d4a574' font-family='sans-serif' font-weight='700'%3E%E2%97%A2%3C/text%3E%3C/svg%3E">

<style>
@import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap');

:root {
  --bg: #0e0b08;
  --bg-2: #15110d;
  --bg-3: #1d1813;
  --bg-4: #261f17;
  --line: rgba(255, 255, 255, 0.08);
  --line-strong: rgba(255, 255, 255, 0.16);
  --text: #ede4d6;
  --text-2: #b5a896;
  --muted: #75695a;
  --accent: #d4a574;
  --accent-2: #c98a6b;
  --green: #7ca85a;
  --red: #c46b5b;
  --yellow: #d4b554;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  margin: 0; padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter Tight', -apple-system, sans-serif;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior-y: none;
  line-height: 1.45;
}

.app {
  max-width: 480px;
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
  padding-top: var(--safe-top);
  padding-bottom: var(--safe-bot);
}

.app::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(at 20% 0%, rgba(212, 165, 116, 0.06) 0%, transparent 50%),
    radial-gradient(at 80% 100%, rgba(124, 168, 90, 0.04) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
  max-width: 480px;
  margin: 0 auto;
}

.view { padding: 14px 18px 100px; position: relative; z-index: 1; }

/* HERO */
.hero { display: flex; align-items: center; justify-content: space-between; gap: 14px; padding: 8px 0 20px; }
.hero-left { display: flex; align-items: center; gap: 12px; }
.hero-mark {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 32px;
  color: var(--accent);
  line-height: 1;
  font-weight: 700;
}
.hero-text h1 {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 22px;
  margin: 0;
  letter-spacing: -0.02em;
  font-weight: 700;
}
.hero-text .muted { margin: 2px 0 0; font-size: 12.5px; }
.muted { color: var(--muted); }

.icon-btn {
  background: var(--bg-2);
  border: 1px solid var(--line);
  color: var(--text);
  width: 38px;
  height: 38px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  padding: 0;
}
.icon-btn:hover { border-color: var(--accent); color: var(--accent); }

/* BLOCK SELECTOR */
.waist-banner {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 10px;
  background: linear-gradient(135deg, rgba(212, 165, 116, 0.12), rgba(212, 165, 116, 0.04));
  border: 1px solid rgba(212, 165, 116, 0.3);
  color: var(--accent);
  border-radius: 10px;
  padding: 11px 14px;
  margin-bottom: 14px;
  font-family: inherit;
  text-align: left;
}
.waist-banner-icon, .waist-banner-text { cursor: pointer; }
.waist-banner-icon { display: flex; align-items: center; flex-shrink: 0; }
.waist-banner-text { flex: 1; font-size: 13px; font-weight: 500; }
.waist-banner-dismiss {
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  padding: 4px;
  border-radius: 4px;
  flex-shrink: 0;
  cursor: pointer;
}
.waist-banner-dismiss:hover { color: var(--text); background: rgba(255,255,255,0.06); }

.block-selector {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 10px 14px;
  margin-bottom: 18px;
  cursor: pointer;
}
.block-selector:hover { border-color: var(--line-strong); }
.block-selector-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
.block-selector-name {
  font-weight: 600;
  font-size: 14.5px;
  margin-top: 1px;
}
.block-selector-icon { color: var(--muted); margin-left: auto; }

/* PHASE CARD */
.phase-card {
  background: linear-gradient(135deg, var(--bg-2), var(--bg-3));
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 16px 18px;
  margin-bottom: 18px;
  position: relative;
  overflow: hidden;
  cursor: pointer;
}
.phase-card::after {
  content: '';
  position: absolute;
  right: -40px; top: -40px;
  width: 140px; height: 140px;
  background: radial-gradient(circle, rgba(212, 165, 116, 0.12), transparent 70%);
}
.phase-card-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.phase-week-row { display: flex; align-items: baseline; gap: 10px; }
.week-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 0.1em;
  background: rgba(212, 165, 116, 0.1);
  padding: 4px 8px;
  border-radius: 4px;
  border: 1px solid rgba(212, 165, 116, 0.2);
}
.phase-name {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 17px;
  font-weight: 600;
}
.phase-card .icon-arrow { color: var(--muted); z-index: 1; }
.phase-desc { margin: 6px 0 0; font-size: 13px; color: var(--text-2); }

/* STATS ROW */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 22px;
}
.stat {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 12px 8px;
  text-align: center;
}
.stat-num {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 17px;
  font-weight: 700;
  color: var(--accent);
  line-height: 1.1;
}
.stat-num.small { font-size: 13.5px; }
.stat-sub {
  font-size: 10px;
  color: var(--muted);
  margin-top: 1px;
  font-family: 'JetBrains Mono', monospace;
}
.stat-label {
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-top: 4px;
}

/* SECTIONS */
.section-h {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--text-2);
  margin: 26px 0 10px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.section-h .add-link {
  background: transparent;
  border: none;
  color: var(--accent);
  font-family: inherit;
  font-size: 11px;
  letter-spacing: 0.05em;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 6px;
}
.section-h .add-link:hover { background: rgba(212, 165, 116, 0.08); }

/* EMPTY STATE — home */
.empty-home {
  background: var(--bg-2);
  border: 1px dashed var(--line-strong);
  border-radius: 14px;
  padding: 32px 24px;
  text-align: center;
  margin-bottom: 18px;
}
.empty-home h3 {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 18px;
  margin: 0 0 8px;
}
.empty-home p {
  color: var(--text-2);
  font-size: 13.5px;
  margin: 0 0 18px;
}
.empty-actions { display: flex; flex-direction: column; gap: 8px; }

/* DAY GRID */
.day-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 6px; }
.day-btn {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 14px 16px;
  text-align: left;
  cursor: pointer;
  color: inherit;
  font-family: inherit;
  display: block;
  width: 100%;
}
.day-btn:hover { border-color: var(--line-strong); }
.day-btn.suggested {
  border-color: var(--accent);
  background: linear-gradient(135deg, rgba(212, 165, 116, 0.06), var(--bg-3));
}
.day-btn-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.day-label {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 17px;
  font-weight: 600;
}
.next-pill {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  color: var(--accent);
  background: rgba(212, 165, 116, 0.12);
  padding: 3px 7px;
  border-radius: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.day-subtitle { font-size: 12.5px; color: var(--text-2); margin-bottom: 4px; }
.day-meta { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }

/* BUTTONS */
.primary-btn {
  width: 100%;
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: 10px;
  padding: 14px;
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 14.5px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.primary-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.secondary-btn {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--line-strong);
  border-radius: 10px;
  padding: 12px 14px;
  font-family: inherit;
  font-size: 13.5px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.secondary-btn:hover { border-color: var(--accent); color: var(--accent); }
.danger-btn {
  background: transparent;
  color: var(--red);
  border: 1px solid rgba(196, 107, 91, 0.3);
  border-radius: 10px;
  padding: 12px 14px;
  font-family: inherit;
  font-size: 13.5px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 100%;
}
.danger-btn:hover { background: rgba(196, 107, 91, 0.08); }
.full-btn {
  width: 100%;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 13px;
  color: var(--text);
  font-family: inherit;
  font-size: 13.5px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  cursor: pointer;
}
.full-btn:hover { border-color: var(--accent); color: var(--accent); }

/* TOPBAR */
.topbar {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 16px;
  margin-left: -6px;
}
.back-btn {
  background: transparent;
  border: none;
  color: var(--text);
  cursor: pointer;
  padding: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
}
.back-btn:hover { background: var(--bg-2); }
.topbar-text { flex: 1; min-width: 0; }
.topbar-title {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 19px;
  font-weight: 700;
  letter-spacing: -0.01em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.topbar-subtitle { font-size: 12px; color: var(--text-2); margin-top: 1px; }
.topbar-actions { display: flex; gap: 6px; }
.topbar-action {
  background: transparent;
  border: none;
  color: var(--text-2);
  cursor: pointer;
  padding: 8px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.topbar-action:hover { color: var(--accent); background: var(--bg-2); }

/* SESSION VIEW */
.session-progress-bar {
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.bar-track {
  flex: 1;
  height: 4px;
  background: var(--bg-3);
  border-radius: 2px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--green));
  transition: width 0.3s;
}
.progress-text {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  white-space: nowrap;
}

.exercise-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.exercise-card {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 12px 14px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  cursor: pointer;
  font-family: inherit;
  color: inherit;
  text-align: left;
  width: 100%;
}
.exercise-card.done {
  border-color: rgba(124, 168, 90, 0.4);
  background: linear-gradient(135deg, rgba(124, 168, 90, 0.04), var(--bg-2));
}
.ex-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  padding-top: 4px;
  min-width: 18px;
}
.ex-body { flex: 1; min-width: 0; }
.ex-name { font-weight: 600; font-size: 14.5px; margin-bottom: 3px; }
.ex-scheme {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.ex-last {
  font-size: 11.5px;
  color: var(--text-2);
  margin-top: 4px;
}
.ex-current {
  font-size: 11.5px;
  color: var(--green);
  margin-top: 2px;
  font-weight: 500;
}
.ex-icon { color: var(--muted); padding-top: 4px; }
.exercise-card.done .ex-icon { color: var(--green); }

/* EXERCISE DETAIL */
.ex-header-card {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 14px 16px;
  margin-bottom: 12px;
}
.ex-header-scheme {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text-2);
  margin-bottom: 8px;
  line-height: 1.6;
}
.ex-header-rest {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11.5px;
  color: var(--accent);
  background: rgba(212, 165, 116, 0.08);
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid rgba(212, 165, 116, 0.18);
}

/* COLLAPSIBLE INFO SECTIONS */
.info-section {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 10px;
  margin-bottom: 8px;
  overflow: hidden;
}
.info-section summary {
  list-style: none;
  cursor: pointer;
  padding: 11px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  user-select: none;
}
.info-section summary::-webkit-details-marker { display: none; }
.info-section .info-icon {
  color: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
}
.info-section .info-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  flex: 1;
}
.info-section .chev {
  color: var(--muted);
  transition: transform 0.15s;
}
.info-section[open] .chev { transform: rotate(180deg); }
.info-section .info-body {
  padding: 0 14px 12px;
  font-size: 13px;
  color: var(--text-2);
  line-height: 1.55;
}
.info-section .info-body strong { color: var(--text); font-weight: 600; }

/* LAST TIME */
.last-time-card {
  background: linear-gradient(135deg, rgba(212, 165, 116, 0.06), var(--bg-2));
  border: 1px solid rgba(212, 165, 116, 0.2);
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 16px;
}
.last-time-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 8px;
}
.last-time-sets { display: flex; flex-direction: column; gap: 4px; }
.last-set {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
  color: var(--text-2);
}
.last-set-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  min-width: 16px;
}

/* SETS */
.sets-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 8px; }
.set-row {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 8px 10px;
}
.set-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--muted);
  min-width: 20px;
}
.set-inputs { flex: 1; display: flex; gap: 6px; }
.input-cell {
  flex: 1;
  position: relative;
  display: flex;
  align-items: center;
}
.input-cell.wide { flex: 2; }
.input-cell input {
  width: 100%;
  background: var(--bg-3);
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 10px 38px 10px 10px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  color: var(--text);
  outline: none;
  appearance: textfield;
  -moz-appearance: textfield;
}
.input-cell input::-webkit-outer-spin-button,
.input-cell input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.input-cell input::placeholder { color: var(--muted); opacity: 0.5; }
.input-cell input:focus { border-color: var(--accent); }
.input-label {
  position: absolute;
  right: 10px;
  font-size: 10.5px;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  pointer-events: none;
}
.remove-set {
  background: transparent;
  border: none;
  color: var(--muted);
  cursor: pointer;
  padding: 6px;
  border-radius: 6px;
}
.remove-set:disabled { opacity: 0.3; cursor: not-allowed; }
.add-set-btn {
  background: transparent;
  border: 1px dashed var(--line-strong);
  border-radius: 8px;
  padding: 10px;
  color: var(--text-2);
  font-family: inherit;
  font-size: 13px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  width: 100%;
  margin-bottom: 16px;
}
.add-set-btn:hover { border-color: var(--accent); color: var(--accent); }

.action-row {
  display: grid;
  grid-template-columns: 1fr 1.5fr;
  gap: 8px;
  margin-bottom: 10px;
}

/* MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.6);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  z-index: 100;
  animation: fadeIn 0.2s;
}
.modal {
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 16px 16px 0 0;
  padding: 22px 20px calc(24px + var(--safe-bot));
  width: 100%;
  max-width: 480px;
  max-height: 85vh;
  overflow-y: auto;
  animation: slideUp 0.25s;
}
.modal h3 {

'use strict';

// ============================================================
// STORAGE — localStorage with JSON

const STORAGE_KEY = 'training_log_v1';

const DEFAULT_PHASES = [
  { id: 'p1', name: 'Phase 1', weeks: 'Wk 1–2', tagline: 'Neurological adaptation', desc: 'Learn movements — do not max out. Strength gains this phase are neurological, not tissue growth. Use 60–65% of estimated max. If no recent 1RM, start with a weight you could perform for 15+ clean reps. Ingrain tempo (especially slow eccentrics). Rate knee pain 0–10 after each leg session; target 0–2. If pain exceeds 3, reduce load or hold time.' },
  { id: 'p2', name: 'Phase 2', weeks: 'Wk 3–6', tagline: 'Peak hypertrophy block', desc: 'Progressive overload — chase reps then weight. Hit the top end of each rep range before adding weight. Maintenance kcal ≈ bodyweight × 14–16 (14 sedentary, 16 active). Eat 300–500 kcal above maintenance. Protein 0.8–1g per lb bodyweight. Sleep 7.5–9 hrs.' },
  { id: 'p3', name: 'Phase 3', weeks: 'Wk 7–8', tagline: 'Consolidation & rotation prep', desc: 'Slight volume reduction — assess and prepare. Drop 1 set per exercise in week 8. Partial deload lets connective tissue consolidate. Document working weights. If bilateral knee pain is at 0–1/10, you are cleared for Week 8+ rotations. If either knee still 3+, extend isometric protocol another 4 weeks.' },
  { id: 'p4', name: 'Restart', weeks: 'Wk 9+', tagline: 'New block — exercise rotation', desc: 'Swap to Week 8+ exercises. Keep same set/rep/tempo for first 2 weeks (neurological re-adaptation). Core patterns remain: hip hinge, vertical pull, horizontal pull, knee-safe leg press. Do not rotate again until Wk 16–18. Repeat the Week 8 partial deload at the end of every 8-week block.' },
];

  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultData();
    const parsed = JSON.parse(raw);
    let migrationRan = false;
    // Ensure phases exist (migration safety)
    if (!parsed.phases) { parsed.phases = DEFAULT_PHASES; migrationRan = true; }
    if (!parsed.collapsedSections) { parsed.collapsedSections = {}; migrationRan = true; }
    // Body metrics migration — add empty arrays if missing
    if (!parsed.bodyweightLog) { parsed.bodyweightLog = []; migrationRan = true; }

    if (!parsed.compositionLog) { parsed.compositionLog = []; migrationRan = true; }
    if (parsed.waistBannerDismissedDate === undefined) { parsed.waistBannerDismissedDate = null; migrationRan = true; }
    // One-shot migration: upgrade tricep+curl superset to new type
    if (!parsed.migrations) parsed.migrations = {};
    if (!parsed.migrations.supersetUpgrade) {
      for (const block of parsed.blocks || []) {
        for (const day of block.days || []) {
          for (const ex of day.exercises || []) {
            // Detect the exact preset name from quick-start ("Tricep Pushdown + Curl Superset")
            // Be conservative: require BOTH "pushdown" and "curl" and "superset" in the name,
            // and never touch exercises a user has already converted to superset type.
            const n = (ex.name || '').toLowerCase();
            const isOldTricepCurl = ex.type !== 'superset'
              && n.includes('pushdown')
              && n.includes('curl')
              && n.includes('superset');
            if (isOldTricepCurl) {
              ex.type = 'superset';
              ex.subExercises = [
                { name: 'Tricep Pushdown', type: 'weight' },
                { name: 'Dumbbell Curl', type: 'weight' },
              ];
              migrationRan = true;
            }
          }
        }
      }
      parsed.migrations.supersetUpgrade = true;
      migrationRan = true;
    }
    // Migration: auto-tag preset compound lifts for composite chart
    if (!parsed.migrations.compositeTagging) {
      const compositeNames = ['trap bar deadlift', 'romanian deadlift', 'hip thrust'];
      for (const block of parsed.blocks || []) {
        for (const day of block.days || []) {
          for (const ex of day.exercises || []) {
            if (ex.compositeChart === undefined) {
              const n = (ex.name || '').toLowerCase();
              if (compositeNames.some(name => n.includes(name))) {
                ex.compositeChart = true;
                migrationRan = true;
              }
            }
          }
        }
      }
      parsed.migrations.compositeTagging = true;
      migrationRan = true;
    }
    // Persist immediately if any migration changed data
    if (migrationRan) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(parsed)); } catch (e) { /* ignore */ }
    }
    return parsed;
  } catch (e) {
    console.error('Load failed:', e);
    return defaultData();
  }
}

function defaultData() {
  return {
    version: 1,
    startDate: new Date().toISOString(),
    blocks: [],          // array of { id, name, weeksLabel, days: [{ id, name, subtitle, exercises: [{...}] }] }
    activeBlockId: null,
    sessions: [],        // array of completed/draft sessions
    phases: DEFAULT_PHASES,
    collapsedSections: {}, // { 'exId-target': true, ... } — per-exercise collapse state
    bodyweightLog: [],   // array of { id, date, value } — weekly bodyweight entries (lbs)
    waistLog: [],        // array of { id, date, value } — biweekly waist entries (inches)
    compositionLog: [],  // array of { id, date, bodyFat, visceralFat, musclePct, bmi } — scale readings
    waistBannerDismissedDate: null, // ISO date string — banner dismissed for this week
  };
}

function saveData(d) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
    return true;
  } catch (e) {
    console.error('Save failed:', e);
    return false;
  }
}

// ============================================================
// HELPERS
// ============================================================
function uid(prefix) {
  return `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 7)}`;
}

function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}

function fmtDateShort(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function daysAgo(iso) {
  const diff = Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
  if (diff < 1) return 'today';
  if (diff < 2) return 'yesterday';
  return `${diff}d ago`;
}

function getActiveBlock(data) {
  return data.blocks.find(b => b.id === data.activeBlockId) || null;
}

function getLastEntryForExercise(sessions, exId, dayId = null) {
  // If dayId is provided, only consider sessions from that specific day
  for (let i = sessions.length - 1; i >= 0; i--) {
    if (!sessions[i].completed) continue;
    if (dayId && sessions[i].dayId !== dayId) continue;
    const entry = sessions[i].entries?.[exId];
    if (entry && (entry.sets?.length > 0 || entry.subSets)) {
      return { entry, date: sessions[i].date };
    }
  }
  return null;
}

function getWeekNumber(startDate) {
  const days = Math.floor((Date.now() - new Date(startDate).getTime()) / 86400000);
  return Math.max(1, Math.floor(days / 7) + 1);
}

function getPhase(week, phases) {
  if (week <= 2) return phases[0];
  if (week <= 6) return phases[1];
  if (week <= 8) return phases[2];
  return phases[3];
}

function getLastBodyweight() {
  const log = data.bodyweightLog || [];
  if (log.length === 0) return null;
  return [...log].sort((a, b) => new Date(b.date) - new Date(a.date))[0];
}

function getLastWaist() {
  const log = data.waistLog || [];
  if (log.length === 0) return null;
  return [...log].sort((a, b) => new Date(b.date) - new Date(a.date))[0];
}

function getLastComposition() {
  const log = data.compositionLog || [];
  if (log.length === 0) return null;
  return [...log].sort((a, b) => new Date(b.date) - new Date(a.date))[0];
}

function daysSinceLastWaist() {
  const last = getLastWaist();
  if (!last) return null;
  return Math.floor((Date.now() - new Date(last.date).getTime()) / 86400000);
}

function isWaistDue() {
  const days = daysSinceLastWaist();
  if (days === null) return true; // never logged
  return days >= 14;
}

function shouldShowWaistBanner() {
  if (!isWaistDue()) return false;
  // Don't show again if dismissed within last 3 days
  const dismissedISO = data.waistBannerDismissedDate;
  if (!dismissedISO) return true;
  const daysSinceDismiss = Math.floor((Date.now() - new Date(dismissedISO).getTime()) / 86400000);
  return daysSinceDismiss >= 3;
}

function summarizeSets(setsOrEntry, type, ex = null) {
  // Backward compat: if called with the old single-array signature
  let sets = setsOrEntry;
  let entry = null;
  if (setsOrEntry && !Array.isArray(setsOrEntry) && (setsOrEntry.sets || setsOrEntry.subSets)) {
    entry = setsOrEntry;
    sets = entry.sets;
  }
  if (entry && entry.subSets && ex && isSuperset(ex)) {
    // Superset summary: "A: 30lb×12 / B: 25lb×12"
    const parts = ex.subExercises.map((sub, idx) => {
      const subSets = entry.subSets[idx] || [];
      if (subSets.length === 0) return null;
      const label = sub.name.split(' ')[0];
      return `${label}: ${summarizeSets(subSets, sub.type || 'weight')}`;
    }).filter(Boolean);
    return parts.join(' / ') || '—';
  }
  if (!sets || sets.length === 0) return '—';
  if (type === 'cardio') {
    return sets[0].duration ? `${sets[0].duration} min` : 'logged';
  }
  if (type === 'isometric') {
    const max = Math.max(...sets.map(s => s.duration || 0));
    return `${sets.length} × ${max}s`;
  }
  if (type === 'isometric_weighted') {
    const w = Math.max(...sets.map(s => s.weight || 0));
    const d = Math.max(...sets.map(s => s.duration || 0));
    return `${sets.length} × ${d}s @ ${w}lb`;
  }
  const w = Math.max(...sets.map(s => s.weight || 0));
  const reps = sets.map(s => s.reps).filter(r => r != null).join('/');
  return `${w}lb × ${reps || '—'}`;
}

function formatSetDisplay(s, type) {
  if (type === 'weight') return `${s.weight ?? '—'} lb × ${s.reps ?? '—'}`;
  if (type === 'isometric') return `${s.duration ?? '—'} sec`;
  if (type === 'isometric_weighted') return `${s.duration ?? '—'}s @ ${s.weight ?? 0}lb`;
  if (type === 'cardio') return `${s.duration ?? '—'} min`;
  return '—';
}

// ============================================================
// APP STATE & ROUTER
// ============================================================
let data = loadData();
let route = { view: 'home', params: {} };
let toastTimer = null;

function persist() { saveData(data); }

function navigate(view, params = {}) {
  route = { view, params };
  render();
  window.scrollTo(0, 0);
}

function showToast(msg) {
  clearTimeout(toastTimer);
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  toastTimer = setTimeout(() => t.remove(), 2200);
}

function render() {
  const app = document.getElementById('app');
  app.innerHTML = `<div class="app">${routeContent()}</div>`;
  // Attach handlers AFTER inserting innerHTML
  attachHandlers();
}

function routeContent() {
  switch (route.view) {
    case 'home': return renderHome();
    case 'phases': return renderPhases();
    case 'blocks': return renderBlocksList();
    case 'block-edit': return renderBlockEdit();
    case 'exercise-edit': return renderExerciseEdit();
    case 'session': return renderSession();
    case 'exercise': return renderExerciseLog();
    case 'progress': return renderProgress();
    case 'history': return renderHistory();
    case 'settings': return renderSettings();
    case 'body': return renderBody();
    default: return renderHome();
  }
}

// ============================================================
// HOME VIEW
// ============================================================
function renderHome() {
  const activeBlock = getActiveBlock(data);
  const week = getWeekNumber(data.startDate);
  const phase = getPhase(week, data.phases);
  const completedSessions = data.sessions.filter(s => s.completed);
  const totalSessions = completedSessions.length;
  const lastSession = [...completedSessions].sort((a, b) => new Date(b.date) - new Date(a.date))[0];
  const dayOrder = activeBlock ? activeBlock.days.map(d => d.id) : [];
  let suggestedDayId = dayOrder[0] || null;
  if (lastSession && dayOrder.includes(lastSession.dayId)) {
    const idx = dayOrder.indexOf(lastSession.dayId);
    suggestedDayId = dayOrder[(idx + 1) % dayOrder.length];
  }

  return `
    <div class="view">
      <header class="hero">
        <div class="hero-left">
          <div class="hero-mark">◢</div>
          <div class="hero-text">
            <h1>Training</h1>
            <p class="muted">${fmtDate(new Date().toISOString())}</p>
          </div>
        </div>
        <div style="display: flex; gap: 8px;">
          <button class="icon-btn" data-action="goto-body" aria-label="Body metrics">${I.body()}</button>
          <button class="icon-btn" data-action="goto-settings" aria-label="Settings">${I.settings()}</button>
        </div>
      </header>

      ${shouldShowWaistBanner() ? renderWaistBanner() : ''}

      <div class="block-selector" data-action="goto-blocks">
        <div>
          <div class="block-selector-label">Active block</div>
          <div class="block-selector-name">${activeBlock ? escapeHtml(activeBlock.name) : 'No block selected'}</div>
        </div>
        <div class="block-selector-icon">${I.chevR()}</div>
      </div>

      <div class="phase-card" data-action="goto-phases">
        <div class="phase-card-head">
          <div class="phase-week-row">
            <span class="week-num">WK ${week}</span>
            <span class="phase-name">${phase.name}</span>
          </div>
          <span class="icon-arrow">${I.chevR(16)}</span>
        </div>
        <p class="phase-desc">${escapeHtml(phase.tagline)}</p>
      </div>

      <div class="stats-row">
        <div class="stat">
          <div class="stat-num">${totalSessions}</div>
          <div class="stat-label">sessions</div>
        </div>
        <div class="stat">
          ${lastSession
            ? `<div class="stat-num small">${fmtDateShort(lastSession.date)}</div><div class="stat-sub">${daysAgo(lastSession.date)}</div>`
            : `<div class="stat-num">—</div>`}
          <div class="stat-label">last lift</div>
        </div>
        <div class="stat">
          <div class="stat-num">${suggestedDayId && activeBlock ? escapeHtml(activeBlock.days.find(d => d.id === suggestedDayId).name) : '—'}</div>
          <div class="stat-label">up next</div>
        </div>
      </div>

      ${!activeBlock ? renderEmptyHome() : renderDayGrid(activeBlock, suggestedDayId)}

      <h2 class="section-h">Progression</h2>
      <button class="full-btn" data-action="goto-history">${I.trend(16)}<span>View history & progress</span></button>

      <p class="footer-note">Data is saved locally on this device. Export regularly from settings to back up.</p>
    </div>
  `;
}

function renderWaistBanner() {
  const days = daysSinceLastWaist();
  const isFirst = days === null;
  const msg = isFirst
    ? 'Start tracking your waist — tap for instructions'
    : `Waist measurement due — last measured ${days} day${days === 1 ? '' : 's'} ago`;
  return `
    <div class="waist-banner">
      <span class="waist-banner-icon" data-action="goto-body">${I.info(16)}</span>
      <span class="waist-banner-text" data-action="goto-body">${escapeHtml(msg)}</span>
      <span class="waist-banner-dismiss" data-action="dismiss-waist-banner" role="button" aria-label="Dismiss">${I.close(14)}</span>
    </div>
  `;
}

function renderEmptyHome() {
  return `
    <div class="empty-home">
      <h3>No training block yet</h3>
      <p>Create a block to start logging sessions. Each block is a phase of your training (e.g., Weeks 1–8, Weeks 9–16).</p>
      <div class="empty-actions">
        <button class="primary-btn" data-action="quickstart">${I.plus()}<span>Quick-start with my plan</span></button>
        <button class="secondary-btn" data-action="goto-blocks">${I.plus()}<span>Create blank block</span></button>
      </div>
    </div>
  `;
}

function renderDayGrid(block, suggestedDayId) {
  return `
    <h2 class="section-h">Start session</h2>
    <div class="day-grid">
      ${block.days.map(day => `
        <button class="day-btn ${day.id === suggestedDayId ? 'suggested' : ''}" data-action="start-session" data-day-id="${day.id}">
          <div class="day-btn-top">
            <span class="day-label">${escapeHtml(day.name)}</span>
            ${day.id === suggestedDayId ? '<span class="next-pill">next</span>' : ''}
          </div>
          <div class="day-subtitle">${escapeHtml(day.subtitle || '')}</div>
          <div class="day-meta">${day.exercises.length} exercise${day.exercises.length === 1 ? '' : 's'}</div>
        </button>
      `).join('')}
    </div>
  `;
}

// ============================================================
// PHASES VIEW
// ============================================================
function renderPhases() {
  const week = getWeekNumber(data.startDate);
  const activePhase = getPhase(week, data.phases);
  return `
    <div class="view">
      ${topbar('Phases', `Week ${week} of training`)}
      <div>
        ${data.phases.map(p => `
          <div class="phase-block ${p.id === activePhase.id ? 'active' : ''}">
            <div class="phase-block-head">
              <div>
                <span class="phase-block-name">${escapeHtml(p.name)}</span>
                ${p.id === activePhase.id ? '<span class="active-badge">current</span>' : ''}
              </div>
              <div class="phase-block-weeks">${escapeHtml(p.weeks)}</div>
            </div>
            <div class="phase-block-tagline">${escapeHtml(p.tagline)}</div>
            <div class="phase-block-desc">${escapeHtml(p.desc)}</div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

// ============================================================
// BLOCKS LIST VIEW
// ============================================================
function renderBlocksList() {
  return `
    <div class="view">
      ${topbar('Training Blocks', `${data.blocks.length} total`)}
      ${data.blocks.length === 0 ? `
        <div class="empty-state">
          ${I.dumbbell()}
          <p>No blocks yet</p>
          <p class="muted">A block is a phase of your training. You can have several and switch between them.</p>
        </div>
      ` : `
        <div class="block-list">
          ${data.blocks.map(b => `
            <div class="block-item ${b.id === data.activeBlockId ? 'active' : ''}">
              <div class="block-info" data-action="edit-block" data-block-id="${b.id}">
                <div class="block-name">${escapeHtml(b.name)} ${b.id === data.activeBlockId ? '<span class="active-badge">active</span>' : ''}</div>
                <div class="block-meta">${escapeHtml(b.weeksLabel || '')} · ${b.days.length} day${b.days.length === 1 ? '' : 's'} · ${b.days.reduce((sum, d) => sum + d.exercises.length, 0)} exercises</div>
              </div>
              <div class="block-actions">
                ${b.id !== data.activeBlockId ? `<button class="block-action-btn" data-action="activate-block" data-block-id="${b.id}" aria-label="Make active">${I.check(14)}</button>` : ''}
                <button class="block-action-btn danger" data-action="delete-block" data-block-id="${b.id}" aria-label="Delete">${I.trash()}</button>
              </div>
            </div>
          `).join('')}
        </div>
      `}
      <div style="margin-top: 16px; display: flex; flex-direction: column; gap: 8px;">
        <button class="primary-btn" data-action="create-block">${I.plus()}<span>New block</span></button>
        ${data.blocks.length === 0 ? `<button class="secondary-btn" data-action="quickstart">${I.plus()}<span>Or quick-start with my plan</span></button>` : ''}
      </div>
    </div>
  `;
}

// ============================================================
// BLOCK EDIT VIEW
// ============================================================
function renderBlockEdit() {
  const block = data.blocks.find(b => b.id === route.params.blockId);
  if (!block) { navigate('blocks'); return ''; }
  const activeDayId = route.params.dayId || block.days[0]?.id;
  const activeDay = block.days.find(d => d.id === activeDayId);

  return `
    <div class="view">
      ${topbar(escapeHtml(block.name), 'Edit block')}

      <button class="secondary-btn" data-action="edit-block-meta" data-block-id="${block.id}" style="margin-bottom: 16px;">${I.edit()}<span>Edit block name / weeks</span></button>

      <h2 class="section-h">Training days</h2>
      <div class="editor-day-tabs">
        ${block.days.map(d => `
          <button class="day-tab ${d.id === activeDayId ? 'active' : ''}" data-action="select-day" data-block-id="${block.id}" data-day-id="${d.id}">
            ${escapeHtml(d.name)}
          </button>
        `).join('')}
        <button class="day-tab add-tab" data-action="add-day" data-block-id="${block.id}">${I.plus(12)} Day</button>
      </div>

      ${activeDay ? renderDayEditor(block, activeDay) : '<p class="muted">No days yet. Add one to get started.</p>'}
    </div>
  `;
}

function renderDayEditor(block, day) {
  return `
    <div class="settings-section">
      <h3>${escapeHtml(day.name)}</h3>
      <p>${escapeHtml(day.subtitle || 'No subtitle')}</p>
      <div style="display: flex; gap: 8px;">
        <button class="secondary-btn" data-action="edit-day" data-block-id="${block.id}" data-day-id="${day.id}" style="flex: 1;">${I.edit()}<span>Edit day</span></button>
        ${block.days.length > 1 ? `<button class="danger-btn" data-action="delete-day" data-block-id="${block.id}" data-day-id="${day.id}" style="flex: 0 0 auto; width: auto; padding: 12px 16px;">${I.trash()}</button>` : ''}
      </div>
    </div>

    <h2 class="section-h">Exercises <button class="add-link" data-action="add-exercise" data-block-id="${block.id}" data-day-id="${day.id}">+ Add</button></h2>
    ${day.exercises.length === 0 ? `
      <div class="empty-state">
        <p>No exercises yet</p>
      </div>
    ` : `
      <div class="editor-ex-list">
        ${day.exercises.map((ex, idx) => `
          <div class="editor-ex-row">
            <div class="editor-ex-info" data-action="edit-exercise" data-block-id="${block.id}" data-day-id="${day.id}" data-ex-id="${ex.id}">
              <div class="editor-ex-name">${escapeHtml(ex.name)}</div>
              <div class="editor-ex-meta">${escapeHtml(truncate(ex.scheme, 50))}</div>
            </div>
            <div class="editor-ex-actions">
              ${idx > 0 ? `<button class="reorder-btn" data-action="move-ex" data-block-id="${block.id}" data-day-id="${day.id}" data-ex-id="${ex.id}" data-dir="up">${I.up()}</button>` : ''}
              ${idx < day.exercises.length - 1 ? `<button class="reorder-btn" data-action="move-ex" data-block-id="${block.id}" data-day-id="${day.id}" data-ex-id="${ex.id}" data-dir="down">${I.down()}</button>` : ''}
              <button class="reorder-btn" data-action="delete-exercise" data-block-id="${block.id}" data-day-id="${day.id}" data-ex-id="${ex.id}">${I.trash()}</button>
            </div>
          </div>
        `).join('')}
      </div>
    `}
  `;
}

// ============================================================
// EXERCISE EDIT VIEW
// ============================================================
function renderSubExerciseFields(draft) {
  if (!draft.subExercises || draft.subExercises.length === 0) {
    draft.subExercises = [
      { name: '', type: 'weight' },
      { name: '', type: 'weight' },
    ];
  }
  return `
    <div style="background: var(--bg-3); border: 1px solid var(--line); border-radius: 10px; padding: 14px; margin-bottom: 14px;">
      <div style="font-size: 12px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; font-family: 'JetBrains Mono', monospace; margin-bottom: 10px;">Sub-exercises</div>
      ${draft.subExercises.map((sub, idx) => `
        <label class="field">
          <span>Sub-exercise ${idx + 1} name</span>
          <input type="text" data-bind-sub="${idx}" data-sub-field="name" value="${escapeHtml(sub.name)}" placeholder="${idx === 0 ? 'e.g., Tricep Pushdown' : 'e.g., Dumbbell Curl'}">
        </label>
        <label class="field">
          <span>Sub-exercise ${idx + 1} type</span>
          <select data-bind-sub="${idx}" data-sub-field="type">
            <option value="weight" ${sub.type === 'weight' ? 'selected' : ''}>Weight × Reps</option>
            <option value="isometric" ${sub.type === 'isometric' ? 'selected' : ''}>Isometric (seconds)</option>
            <option value="isometric_weighted" ${sub.type === 'isometric_weighted' ? 'selected' : ''}>Weighted hold</option>
            <option value="cardio" ${sub.type === 'cardio' ? 'selected' : ''}>Cardio (minutes)</option>
          </select>
        </label>
      `).join('')}
    </div>
  `;
}

function renderExerciseEdit() {
  const { blockId, dayId, exId, isNew } = route.params;
  const block = data.blocks.find(b => b.id === blockId);
  const day = block?.days.find(d => d.id === dayId);
  const ex = exId && day ? day.exercises.find(e => e.id === exId) : null;

  // Use route.params.draft as form state across re-renders
  const draft = route.params.draft || (ex ? { ...ex } : {
    id: uid('e'),
    name: '',
    scheme: '',
    rest: '',
    target: '',
    goal: '',
    progression: '',
    rotation: '',
    type: 'weight',
  });
  route.params.draft = draft;

  return `
    <div class="view">
      ${topbar(isNew ? 'New exercise' : 'Edit exercise', escapeHtml(day?.name || ''))}

      <label class="field">
        <span>Exercise name</span>
        <input type="text" data-bind="name" value="${escapeHtml(draft.name)}" placeholder="e.g., Romanian Deadlift">
      </label>

      <label class="field">
        <span>Type (determines what you log)</span>
        <select data-bind="type">
          <option value="weight" ${draft.type === 'weight' ? 'selected' : ''}>Weight × Reps</option>
          <option value="isometric" ${draft.type === 'isometric' ? 'selected' : ''}>Isometric hold (seconds)</option>
          <option value="isometric_weighted" ${draft.type === 'isometric_weighted' ? 'selected' : ''}>Weighted hold (seconds + lbs)</option>
          <option value="cardio" ${draft.type === 'cardio' ? 'selected' : ''}>Cardio (minutes)</option>
          <option value="superset" ${draft.type === 'superset' ? 'selected' : ''}>Superset (two exercises tracked separately)</option>
        </select>
      </label>

      ${draft.type === 'superset' ? renderSubExerciseFields(draft) : ''}

      <label class="field">
        <span>Sets × Reps / Tempo (full description)</span>
        <textarea data-bind="scheme" rows="3" placeholder="e.g., 4 × 8. 3 sec eccentric, 1 sec pause, 2 sec concentric.">${escapeHtml(draft.scheme)}</textarea>
      </label>

      <label class="field">
        <span>Rest between sets</span>
