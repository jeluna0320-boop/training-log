        <button class="primary-btn" data-action="save-exercise" data-block-id="${blockId}" data-day-id="${dayId}" data-is-new="${isNew ? '1' : '0'}">${I.save()}<span>Save exercise</span></button>
      </div>
    </div>
  `;
}

// ============================================================
// SESSION VIEW
// ============================================================
function renderSession() {
  const { sessionId } = route.params;
  const session = data.sessions.find(s => s.id === sessionId);
  if (!session) { navigate('home'); return ''; }
  const block = data.blocks.find(b => b.id === session.blockId);
  const day = block?.days.find(d => d.id === session.dayId);
  if (!day) { navigate('home'); return ''; }

  const completedCount = day.exercises.filter(e => session.entries?.[e.id]?.sets?.length > 0).length;
  const completedAny = completedCount > 0;
  const otherSessions = data.sessions.filter(s => s.id !== session.id);

  return `
    <div class="view">
      ${topbar(escapeHtml(day.name), escapeHtml(day.subtitle || ''))}

      <div class="session-progress-bar">
        <div class="bar-track"><div class="bar-fill" style="width: ${(completedCount / day.exercises.length) * 100}%"></div></div>
        <div class="progress-text">${completedCount} of ${day.exercises.length}</div>
      </div>

      <div class="exercise-list">
        ${day.exercises.map((ex, idx) => {
          const entry = session.entries?.[ex.id];
          const isDone = !!(entry && (entry.sets?.length > 0 || entry.subSets));
          const last = getLastEntryForExercise(otherSessions, ex.id, day.id);
          return `
            <button class="exercise-card ${isDone ? 'done' : ''}" data-action="open-exercise" data-ex-id="${ex.id}">
              <div class="ex-num">${String(idx + 1).padStart(2, '0')}</div>
              <div class="ex-body">
                <div class="ex-name">${escapeHtml(ex.name)}</div>
                <div class="ex-scheme">${escapeHtml(truncate(ex.scheme, 60))}</div>
                ${last ? `<div class="ex-last">last: ${escapeHtml(summarizeSets(last.entry, ex.type, ex))} · ${daysAgo(last.date)}</div>` : ''}
                ${isDone ? `<div class="ex-current">today: ${escapeHtml(summarizeSets(entry, ex.type, ex))}</div>` : ''}
              </div>
              <div class="ex-icon">${isDone ? I.check() : I.chevR(20)}</div>
            </button>
          `;
        }).join('')}
      </div>

      <button class="primary-btn" data-action="finish-session" ${!completedAny ? 'disabled' : ''}>${I.save()}<span>Finish session</span></button>
    </div>
  `;
}

// ============================================================
// EXERCISE LOG VIEW
// ============================================================
function renderExerciseLog() {
  const { sessionId, exId } = route.params;
  const session = data.sessions.find(s => s.id === sessionId);
  if (!session) { navigate('home'); return ''; }
  const block = data.blocks.find(b => b.id === session.blockId);
  const day = block?.days.find(d => d.id === session.dayId);
  const ex = day?.exercises.find(e => e.id === exId);
  if (!ex) { navigate('home'); return ''; }

  const otherSessions = data.sessions.filter(s => s.id !== session.id);
  const last = getLastEntryForExercise(otherSessions, exId, day.id);

  if (isSuperset(ex)) {
    return renderSupersetLog(session, day, ex, last);
  }

  const existingSets = session.entries?.[exId]?.sets || [];

  // Initialize working sets state (held in route.params for cross-render persistence)
  if (!route.params.workingSets) {
    if (existingSets.length > 0) {
      route.params.workingSets = existingSets.map(s => ({ ...s }));
    } else if (last && last.entry.sets) {
      route.params.workingSets = last.entry.sets.map(s => ({ ...s }));
    } else {
      const setCount = parseSetCount(ex.scheme);
      route.params.workingSets = Array.from({ length: setCount }, () => emptySet(ex.type));
    }
  }
  const sets = route.params.workingSets;

  return `
    <div class="view">
      ${topbar(escapeHtml(ex.name), escapeHtml(day.name))}

      <div class="ex-header-card">
        <div class="ex-header-scheme">${escapeHtml(ex.scheme)}</div>
        <span class="ex-header-rest">${I.clock()}<span>${escapeHtml(ex.rest || '—')} rest</span></span>
      </div>

      ${renderInfoSection(exId, 'target', 'Target muscles', ex.target, I.target())}
      ${renderInfoSection(exId, 'goal', 'Goal alignment', ex.goal, I.flag())}
      ${renderInfoSection(exId, 'progression', 'Progression (8 wks)', ex.progression, I.arrow())}
      ${renderInfoSection(exId, 'rotation', 'Week 8+ rotation', ex.rotation, I.rotate())}

      ${last && last.entry.sets ? `
        <div class="last-time-card">
          <div class="last-time-label">Last ${escapeHtml(day.name)} · ${fmtDate(last.date)} · ${daysAgo(last.date)}</div>
          <div class="last-time-sets">
            ${last.entry.sets.map((s, i) => `
              <div class="last-set"><span class="last-set-num">${i + 1}</span><span>${escapeHtml(formatSetDisplay(s, ex.type))}</span></div>
            `).join('')}
          </div>
        </div>
      ` : ''}

      <h3 class="section-h" style="margin-top: 18px;">Today\u2019s sets</h3>

      <div class="sets-list">
        ${sets.map((set, idx) => renderSetRow(idx, set, ex.type, last?.entry.sets?.[idx], sets.length)).join('')}
      </div>

      <button class="add-set-btn" data-action="add-set">${I.plus()}<span>Add set</span></button>

      <div class="action-row">
        <button class="secondary-btn" data-action="goto-progress" data-ex-id="${ex.id}">${I.trend()}<span>Progress</span></button>
        <button class="primary-btn" data-action="save-sets" data-ex-id="${ex.id}">${I.save()}<span>Save</span></button>
      </div>
    </div>
  `;
}

function renderSupersetLog(session, day, ex, last) {
  const exId = ex.id;
  const existingEntry = session.entries?.[exId];

  // Initialize workingSubSets: { 0: [...], 1: [...] }
  if (!route.params.workingSubSets) {
    const initial = {};
    ex.subExercises.forEach((sub, idx) => {
      if (existingEntry && existingEntry.subSets && existingEntry.subSets[idx]) {
        initial[idx] = existingEntry.subSets[idx].map(s => ({ ...s }));
      } else if (existingEntry && existingEntry.sets && idx === 0) {
        // Migration: old single-exercise data goes into sub 0
        initial[idx] = existingEntry.sets.map(s => ({ ...s }));
      } else if (last && last.entry.subSets && last.entry.subSets[idx]) {
        initial[idx] = last.entry.subSets[idx].map(s => ({ ...s }));
      } else if (last && last.entry.sets && idx === 0) {
        // Migration: old last-entry data for sub 0
        initial[idx] = last.entry.sets.map(s => ({ ...s }));
      } else {
        const setCount = parseSetCount(ex.scheme);
        initial[idx] = Array.from({ length: setCount }, () => emptySet(sub.type || 'weight'));
      }
    });
    route.params.workingSubSets = initial;
  }
  const subSets = route.params.workingSubSets;

  return `
    <div class="view">
      ${topbar(escapeHtml(ex.name), escapeHtml(day.name))}

      <div class="ex-header-card">
        <div class="ex-header-scheme">${escapeHtml(ex.scheme)}</div>
        <span class="ex-header-rest">${I.clock()}<span>${escapeHtml(ex.rest || '—')} rest</span></span>
      </div>

      ${renderInfoSection(exId, 'target', 'Target muscles', ex.target, I.target())}
      ${renderInfoSection(exId, 'goal', 'Goal alignment', ex.goal, I.flag())}
      ${renderInfoSection(exId, 'progression', 'Progression (8 wks)', ex.progression, I.arrow())}
      ${renderInfoSection(exId, 'rotation', 'Week 8+ rotation', ex.rotation, I.rotate())}

      ${last ? `
        <div class="last-time-card">
          <div class="last-time-label">Last ${escapeHtml(day.name)} · ${fmtDate(last.date)} · ${daysAgo(last.date)}</div>
          ${ex.subExercises.map((sub, idx) => {
            const ls = last.entry.subSets?.[idx] || (idx === 0 ? last.entry.sets : null);
            if (!ls || ls.length === 0) return '';
            return `
              <div style="margin-top: 8px;">
                <div style="font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; margin-bottom: 4px;">${escapeHtml(sub.name)}</div>
                <div class="last-time-sets">
                  ${ls.map((s, i) => `<div class="last-set"><span class="last-set-num">${i + 1}</span><span>${escapeHtml(formatSetDisplay(s, sub.type || 'weight'))}</span></div>`).join('')}
                </div>
              </div>
            `;
          }).join('')}
        </div>
      ` : ''}

      ${ex.subExercises.map((sub, subIdx) => {
        const sets = subSets[subIdx] || [];
        const lastSubSets = last ? (last.entry.subSets?.[subIdx] || (subIdx === 0 ? last.entry.sets : null)) : null;
        return `
          <h3 class="section-h" style="margin-top: 18px;">${escapeHtml(sub.name)}</h3>
          <div class="sets-list">
            ${sets.map((set, idx) => renderSetRow(idx, set, sub.type || 'weight', lastSubSets?.[idx], sets.length, subIdx)).join('')}
          </div>
          <button class="add-set-btn" data-action="add-sub-set" data-sub-idx="${subIdx}">${I.plus()}<span>Add set to ${escapeHtml(sub.name)}</span></button>
        `;
      }).join('')}

      <div class="action-row" style="margin-top: 16px;">
        <button class="secondary-btn" data-action="goto-progress" data-ex-id="${ex.id}">${I.trend()}<span>Progress</span></button>
        <button class="primary-btn" data-action="save-superset" data-ex-id="${ex.id}">${I.save()}<span>Save</span></button>
      </div>
    </div>
  `;
}

function renderInfoSection(exId, key, label, content, icon) {
  if (!content || !content.trim()) return '';
  const collapseKey = `${exId}-${key}`;
  const isOpen = !data.collapsedSections[collapseKey]; // default open
  return `
    <details class="info-section" ${isOpen ? 'open' : ''} data-collapse-key="${collapseKey}">
      <summary>
        <span class="info-icon">${icon}</span>
        <span class="info-label">${label}</span>
        <span class="chev">${I.chev(14)}</span>
      </summary>
      <div class="info-body">${escapeHtml(content)}</div>
    </details>
  `;
}

function renderSetRow(idx, set, type, lastSet, totalSets, subIdx) {
  const canRemove = totalSets > 1;
  const removeAction = subIdx != null ? 'remove-sub-set' : 'remove-set';
  let inputsHtml = '';
  if (type === 'weight') {
    inputsHtml = `
      ${inputCell('weight', set.weight, lastSet?.weight, 'lbs', idx, false, subIdx)}
      ${inputCell('reps', set.reps, lastSet?.reps, 'reps', idx, false, subIdx)}
    `;
  } else if (type === 'isometric') {
    inputsHtml = inputCell('duration', set.duration, lastSet?.duration, 'sec', idx, true, subIdx);
  } else if (type === 'isometric_weighted') {
    inputsHtml = `
      ${inputCell('duration', set.duration, lastSet?.duration, 'sec', idx, false, subIdx)}
      ${inputCell('weight', set.weight, lastSet?.weight, 'lbs', idx, false, subIdx)}
    `;
  } else if (type === 'cardio') {
    inputsHtml = inputCell('duration', set.duration, lastSet?.duration, 'min', idx, true, subIdx);
  }
  const subAttr = subIdx != null ? ` data-sub-idx="${subIdx}"` : '';
  return `
    <div class="set-row">
      <div class="set-num">${idx + 1}</div>
      <div class="set-inputs">${inputsHtml}</div>
      <button class="remove-set" data-action="${removeAction}" data-idx="${idx}"${subAttr} ${!canRemove ? 'disabled' : ''}>${I.minus()}</button>
    </div>
  `;
}

function inputCell(field, value, last, label, idx, wide, subIdx) {
  const subAttr = subIdx != null ? ` data-sub-idx="${subIdx}"` : '';
  return `
    <div class="input-cell ${wide ? 'wide' : ''}">
      <input type="number" inputmode="decimal" step="any" data-set-input data-idx="${idx}"${subAttr} data-field="${field}" value="${value ?? ''}" placeholder="${last != null ? last : '—'}">
      <span class="input-label">${label}</span>
    </div>
  `;
}

function emptySet(type) {
  if (type === 'isometric') return { duration: '' };
  if (type === 'isometric_weighted') return { duration: '', weight: '' };
  if (type === 'cardio') return { duration: '' };
  return { weight: '', reps: '' };
}

function isSuperset(ex) {
  return ex && ex.type === 'superset' && Array.isArray(ex.subExercises) && ex.subExercises.length >= 2;
}

function getEntrySetCount(entry) {
  if (!entry) return 0;
  if (entry.sets) return entry.sets.length;
  if (entry.subSets) {
    return Math.max(...Object.values(entry.subSets).map(s => s.length));
  }
  return 0;
}

function parseSetCount(scheme) {
  const m = scheme.match(/^\s*(\d+)\s*[×x]/);
  return m ? parseInt(m[1]) : 3;
}

// ============================================================
// PROGRESS VIEW
// ============================================================
function renderProgress() {
  // Look across ALL blocks so progress works for exercises from other blocks too
  const allExercises = data.blocks.flatMap(b =>
    b.days.flatMap(d => d.exercises.map(e => ({ ...e, dayName: d.name, blockName: b.name })))
  );
  if (allExercises.length === 0) {
    return `<div class="view">${topbar('Progress', '')}<div class="empty-state">${I.dumbbell()}<p>No exercises yet</p></div></div>`;
  }
  const currentExId = route.params.exId || allExercises[0]?.id;
  const ex = allExercises.find(e => e.id === currentExId) || allExercises[0];
  if (!ex) {
    return `<div class="view">${topbar('Progress', '')}<div class="empty-state"><p>No exercises found</p></div></div>`;
  }

  let chartsHtml = '';
  let statsHtml = '';

  if (isSuperset(ex)) {
    // Render two separate chart sections, one per sub-exercise
    chartsHtml = ex.subExercises.map((sub, subIdx) => {
      const subPoints = data.sessions
        .filter(s => s.completed && s.entries?.[ex.id])
        .sort((a, b) => new Date(a.date) - new Date(b.date))
        .map(s => {
          const entry = s.entries[ex.id];
          // Look in subSets first, fall back to legacy `sets` for sub 0 only
          let sets = entry.subSets?.[subIdx];
          if (!sets && subIdx === 0 && entry.sets) sets = entry.sets;
          if (!sets || sets.length === 0) return null;
          const dateLabel = fmtDateShort(s.date);
          const subType = sub.type || 'weight';
          if (subType === 'weight') {
            return { date: s.date, dateLabel, weight: Math.max(...sets.map(x => x.weight || 0)), volume: sets.reduce((sum, x) => sum + (x.weight || 0) * (x.reps || 0), 0) };
          }
          return { date: s.date, dateLabel, duration: Math.max(...sets.map(x => x.duration || 0)), weight: Math.max(...sets.map(x => x.weight || 0)) };
        })
        .filter(Boolean);

      const subType = sub.type || 'weight';
      const color = subIdx === 0 ? '#d4a574' : '#7ca85a';
      const subHeader = `<h3 style="font-family: 'Bricolage Grotesque', sans-serif; font-size: 14px; margin: 20px 0 10px; color: ${color};">${escapeHtml(sub.name)}</h3>`;

      if (subPoints.length === 0) {
        return `${subHeader}<div class="empty-state" style="padding: 20px;"><p class="muted">No data yet</p></div>`;
      }

      let subStats, subCharts;
      if (subType === 'weight') {
        const first = subPoints[0].weight, last = subPoints[subPoints.length - 1].weight;
        const peak = Math.max(...subPoints.map(p => p.weight));
        const change = last - first;
        subStats = statsGrid([
          ['Sessions', subPoints.length],
          ['Peak', `${peak} lb`],
          ['Latest', `${last} lb`],
          ['Change', `${change >= 0 ? '+' : ''}${change} lb`, change > 0],
        ]);
        subCharts = `${renderLineChart('Top set weight', subPoints, 'weight', 'lb', color)}${renderLineChart('Total volume', subPoints, 'volume', '', color)}`;
      } else {
        const first = subPoints[0].duration, last = subPoints[subPoints.length - 1].duration;
        const peak = Math.max(...subPoints.map(p => p.duration));
        const change = last - first;
        subStats = statsGrid([
          ['Sessions', subPoints.length],
          ['Peak', `${peak}s`],
          ['Latest', `${last}s`],
          ['Change', `${change >= 0 ? '+' : ''}${change}s`, change > 0],
        ]);
        subCharts = renderLineChart('Hold duration', subPoints, 'duration', 's', color);
      }
      return `${subHeader}${subStats}${subCharts}`;
    }).join('');
  } else {
    // Single-exercise path
    const points = data.sessions
      .filter(s => s.completed && s.entries?.[ex.id]?.sets?.length > 0)
      .sort((a, b) => new Date(a.date) - new Date(b.date))
      .map(s => {
        const sets = s.entries[ex.id].sets;
        const dateLabel = fmtDateShort(s.date);
        if (ex.type === 'weight') {
          return { date: s.date, dateLabel, weight: Math.max(...sets.map(x => x.weight || 0)), volume: sets.reduce((sum, x) => sum + (x.weight || 0) * (x.reps || 0), 0) };
        }
        return { date: s.date, dateLabel, duration: Math.max(...sets.map(x => x.duration || 0)), weight: Math.max(...sets.map(x => x.weight || 0)) };
      });

    if (points.length === 0) {
      chartsHtml = `<div class="empty-state">${I.dumbbell()}<p>No data yet for this exercise.</p><p class="muted">Complete a session to see your progression here.</p></div>`;
    } else {
      if (ex.type === 'weight') {
        const first = points[0].weight, last = points[points.length - 1].weight;
        const peak = Math.max(...points.map(p => p.weight));
        const change = last - first;
        statsHtml = statsGrid([
          ['Sessions', points.length],
          ['Peak', `${peak} lb`],
          ['Latest', `${last} lb`],
          ['Change', `${change >= 0 ? '+' : ''}${change} lb`, change > 0],
        ]);
        chartsHtml = `
          ${renderLineChart('Top set weight', points, 'weight', 'lb', '#d4a574')}
          ${renderLineChart('Total volume (weight × reps)', points, 'volume', '', '#7ca85a')}
        `;
      } else {
        const first = points[0].duration, last = points[points.length - 1].duration;
        const peak = Math.max(...points.map(p => p.duration));
        const change = last - first;
        statsHtml = statsGrid([
          ['Sessions', points.length],
          ['Peak', `${peak}s`],
          ['Latest', `${last}s`],
          ['Change', `${change >= 0 ? '+' : ''}${change}s`, change > 0],
        ]);
        chartsHtml = renderLineChart('Hold duration', points, 'duration', 's', '#d4a574');
      }
    }
  }

  return `
    <div class="view">
      ${topbar('Progress', escapeHtml(ex.name))}
      <button class="exercise-picker-btn" data-action="open-progress-picker">
        <span>${escapeHtml(ex.name)}</span>
        <span class="picker-day-tag">${escapeHtml(ex.dayName)}</span>
      </button>
      ${statsHtml}
      ${chartsHtml}
    </div>
  `;
}

function statsGrid(items) {
  return `<div class="stats-grid">${items.map(([label, value, good]) => `
    <div class="stat-card ${good ? 'stat-good' : ''}">
      <div class="stat-card-value">${value}</div>
      <div class="stat-card-label">${label}</div>
    </div>
  `).join('')}</div>`;
}

function renderLineChart(title, points, key, unit, color) {
  if (points.length === 0) return '';
  const W = 320, H = 180, padL = 32, padR = 8, padT = 14, padB = 22;
  const values = points.map(p => p[key] || 0);
  const minV = Math.min(...values);
  const maxV = Math.max(...values);
  const range = maxV - minV || 1;
  const yMin = minV - range * 0.1;
  const yMax = maxV + range * 0.1;
  const yRange = yMax - yMin || 1;

  const xStep = points.length > 1 ? (W - padL - padR) / (points.length - 1) : 0;
  const xy = points.map((p, i) => {
    const x = padL + i * xStep;
    const y = padT + (H - padT - padB) * (1 - ((p[key] || 0) - yMin) / yRange);
    return [x, y, p];
  });

  // Y-axis labels (3 ticks)
  const ticks = [yMin, (yMin + yMax) / 2, yMax].map(v => {
    const y = padT + (H - padT - padB) * (1 - (v - yMin) / yRange);
    return { v: Math.round(v * 10) / 10, y };
  });

  const path = xy.map(([x, y], i) => `${i === 0 ? 'M' : 'L'} ${x} ${y}`).join(' ');
  const areaPath = `${path} L ${xy[xy.length - 1][0]} ${H - padB} L ${xy[0][0]} ${H - padB} Z`;

  // X-axis labels: show first, last, middle if many
  let xLabels = '';
  if (points.length <= 5) {
    xLabels = xy.map(([x, , p]) => `<text x="${x}" y="${H - 6}" fill="rgba(255,255,255,0.4)" font-size="9" text-anchor="middle" font-family="JetBrains Mono, monospace">${p.dateLabel}</text>`).join('');
  } else {
    const idxs = [0, Math.floor(points.length / 2), points.length - 1];
    xLabels = idxs.map(i => {
      const [x, , p] = xy[i];
      return `<text x="${x}" y="${H - 6}" fill="rgba(255,255,255,0.4)" font-size="9" text-anchor="middle" font-family="JetBrains Mono, monospace">${p.dateLabel}</text>`;
    }).join('');
  }

  return `
    <div class="chart-wrap">
      <div class="chart-title">${escapeHtml(title)}</div>
      <svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
        ${ticks.map(t => `<line x1="${padL}" x2="${W - padR}" y1="${t.y}" y2="${t.y}" stroke="rgba(255,255,255,0.06)" stroke-dasharray="3 3"/><text x="${padL - 6}" y="${t.y + 3}" fill="rgba(255,255,255,0.4)" font-size="9" text-anchor="end" font-family="JetBrains Mono, monospace">${t.v}${unit}</text>`).join('')}
        <path d="${areaPath}" fill="${color}" fill-opacity="0.1"/>
        <path d="${path}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        ${xy.map(([x, y]) => `<circle cx="${x}" cy="${y}" r="3.5" fill="${color}"/>`).join('')}
        ${xLabels}
      </svg>
    </div>
  `;
}

// ============================================================
// HISTORY VIEW
// ============================================================
function renderHistory() {
  const sessions = [...data.sessions].filter(s => s.completed).sort((a, b) => new Date(b.date) - new Date(a.date));
  const kneeData = sessions.filter(s => s.kneePain != null).sort((a, b) => new Date(a.date) - new Date(b.date)).map(s => ({ date: s.date, dateLabel: fmtDateShort(s.date), pain: s.kneePain }));
  const activeBlock = getActiveBlock(data);
  const exLookup = (id) => {
    for (const b of data.blocks) for (const d of b.days) {
      const e = d.exercises.find(e => e.id === id);
      if (e) return e;
    }
    return null;
  };

  return `
    <div class="view">
      ${topbar('History', `${sessions.length} completed`, [
        { action: 'open-progress-picker', icon: I.trend(16), label: 'Progress' }
      ])}

      ${renderCompositeChart()}

      ${kneeData.length >= 2 ? renderKneeChart(kneeData) : ''}

      <h2 class="section-h">Sessions</h2>
      ${sessions.length === 0 ? `<div class="empty-state">${I.cal()}<p>No sessions logged yet</p></div>` : `
        <div class="history-list">
          ${sessions.map(s => {
            const block = data.blocks.find(b => b.id === s.blockId);
            const day = block?.days.find(d => d.id === s.dayId);
            const dayName = day?.name || s.dayName || 'Workout';
            return `
              <div class="history-card">
                <div class="history-head">
                  <div>
                    <div class="history-day">${escapeHtml(dayName)}</div>
                    <div class="history-date">${fmtDate(s.date)}${block ? ' · ' + escapeHtml(block.name) : ''}</div>
                  </div>
                  <button class="block-action-btn danger" data-action="delete-session" data-session-id="${s.id}" aria-label="Delete">${I.trash()}</button>
                </div>
                <div class="history-meta">
                  ${s.kneePain != null ? `<span class="meta-tag pain-tag-${s.kneePain <= 2 ? 'low' : s.kneePain <= 5 ? 'mid' : 'high'}">${I.alert()} knee ${s.kneePain}/10</span>` : ''}
                  ${s.sleepHours ? `<span class="meta-tag">😴 ${s.sleepHours}h</span>` : ''}
                  <span class="meta-tag">${Object.keys(s.entries || {}).length} exercises</span>
                </div>
                <details class="history-details">
                  <summary>View exercises</summary>
                  <div class="history-entries">
                    ${Object.entries(s.entries || {}).map(([exId, entry]) => {
                      const ex = exLookup(exId);
                      if (!ex) return '';
                      return `<button class="history-entry-row" data-action="goto-progress" data-ex-id="${exId}">
                        <span class="he-name">${escapeHtml(ex.name)}</span>
                        <span class="he-summary">${escapeHtml(summarizeSets(entry, ex.type, ex))}</span>
                      </button>`;
                    }).join('')}
                  </div>
                  ${s.notes ? `<div class="history-notes">"${escapeHtml(s.notes)}"</div>` : ''}
                </details>
              </div>
            `;
          }).join('')}
        </div>
      `}
    </div>
  `;
}

function renderCompositeChart() {
  // Gather all body metric series
  const bwSorted = [...(data.bodyweightLog || [])].sort((a, b) => new Date(a.date) - new Date(b.date));
  const waistSorted = [...(data.waistLog || [])].sort((a, b) => new Date(a.date) - new Date(b.date));
  const compSorted = [...(data.compositionLog || [])].sort((a, b) => new Date(a.date) - new Date(b.date));
  const bodyFatSeries = compSorted.filter(e => e.bodyFat != null).map(e => ({ date: e.date, value: e.bodyFat }));
  const muscleSeries = compSorted.filter(e => e.musclePct != null).map(e => ({ date: e.date, value: e.musclePct }));

  // Strength index: top-set sum across composite-tagged exercises per completed session
  const tagged = new Set();
  for (const b of data.blocks) for (const d of b.days) for (const ex of d.exercises) {
    if (ex.compositeChart) tagged.add(ex.id);
  }
  const sessionStrength = [...data.sessions]
    .filter(s => s.completed)
    .sort((a, b) => new Date(a.date) - new Date(b.date))
    .map(s => {
      let total = 0;
      let count = 0;
      for (const exId of Object.keys(s.entries || {})) {
        if (!tagged.has(exId)) continue;
        const entry = s.entries[exId];
        const sets = entry.sets || (entry.subSets ? entry.subSets[0] : null);
        if (sets && sets.length) {
          const top = Math.max(...sets.map(x => x.weight || 0));
          if (top > 0) { total += top; count++; }
        }
      }
      return count > 0 ? { date: s.date, value: total } : null;
    })
    .filter(Boolean);

  const haveBW = bwSorted.length >= 2;
  const haveBodyFat = bodyFatSeries.length >= 2;
  const haveMuscle = muscleSeries.length >= 2;
  const haveStrength = sessionStrength.length >= 2;

  if (!haveBW && !haveBodyFat && !haveMuscle && !haveStrength) return '';

  const seriesCount = [haveBW, haveBodyFat, haveMuscle, haveStrength].filter(Boolean).length;
  if (seriesCount < 2) {
    let needsMsg = [];
    if (!haveBW) needsMsg.push('bodyweight');
    if (!haveBodyFat) needsMsg.push('body fat %');
    if (!haveMuscle) needsMsg.push('muscle %');
    if (!haveStrength) needsMsg.push('compound-lift sessions');
    return `
      <h2 class="section-h">Body vs strength</h2>
      <div class="chart-wrap" style="padding: 20px; text-align: center;">
        <p class="muted" style="font-size: 12.5px; margin: 0;">Need 2+ entries each in at least 2 of: ${needsMsg.join(', ')}.</p>
      </div>
    `;
  }

  // Normalize each series to % change from its first value
  function normalize(arr) {
    if (arr.length === 0) return [];
    const base = arr[0].value;
    return arr.map(p => ({
      date: p.date,
      pct: base !== 0 ? (p.value - base) / Math.abs(base) * 100 : 0,
      raw: p.value,
    }));
  }
  const bwPts = haveBW ? normalize(bwSorted.map(e => ({ date: e.date, value: e.value }))) : [];
  const bodyFatPts = haveBodyFat ? normalize(bodyFatSeries) : [];
  const musclePts = haveMuscle ? normalize(muscleSeries) : [];
  const strengthPts = haveStrength ? normalize(sessionStrength) : [];

  // Build SVG: shared time axis
  const allDates = [
    ...bwPts.map(p => new Date(p.date).getTime()),
    ...bodyFatPts.map(p => new Date(p.date).getTime()),
    ...musclePts.map(p => new Date(p.date).getTime()),
    ...strengthPts.map(p => new Date(p.date).getTime()),
  ];
  const tMin = Math.min(...allDates);
  const tMax = Math.max(...allDates);
  const tRange = tMax - tMin || 1;

  const allPcts = [...bwPts, ...bodyFatPts, ...musclePts, ...strengthPts].map(p => p.pct);
  const pctMin = Math.min(0, ...allPcts);
  const pctMax = Math.max(0, ...allPcts);
  const pad = Math.max(2, (pctMax - pctMin) * 0.1);
  const yMin = pctMin - pad;
  const yMax = pctMax + pad;
  const yRange = yMax - yMin || 1;

  const W = 320, H = 200, padL = 36, padR = 8, padT = 12, padB = 24;
  const xOf = t => padL + ((t - tMin) / tRange) * (W - padL - padR);
  const yOf = pct => padT + (H - padT - padB) * (1 - (pct - yMin) / yRange);

  function makePath(pts) {
    if (pts.length === 0) return '';
    return pts.map((p, i) => `${i === 0 ? 'M' : 'L'} ${xOf(new Date(p.date).getTime())} ${yOf(p.pct)}`).join(' ');
  }
  function dotsFor(pts, color) {
    return pts.map(p => `<circle cx="${xOf(new Date(p.date).getTime())}" cy="${yOf(p.pct)}" r="2.5" fill="${color}"/>`).join('');
  }

  const yTicks = [yMin, 0, yMax].map(v => ({ v: Math.round(v * 10) / 10, y: yOf(v) }));
  const zeroY = yOf(0);
  const xLabels = [tMin, (tMin + tMax) / 2, tMax].map(t => ({
    x: xOf(t),
    label: fmtDateShort(new Date(t).toISOString()),
  }));

  return `
    <h2 class="section-h">Body vs strength</h2>
    <div class="composite-key">
      <div class="composite-key-row"><span class="composite-key-dot" style="color: var(--green);">⬆</span><span><strong style="color: var(--green);">Muscle % up + strength up</strong> — real muscle gain</span></div>
      <div class="composite-key-row"><span class="composite-key-dot" style="color: var(--accent);">~</span><span><strong style="color: var(--accent);">Weight up, body fat & muscle stable</strong> — clean bulk, surplus working</span></div>
      <div class="composite-key-row"><span class="composite-key-dot" style="color: var(--yellow);">⚠</span><span><strong style="color: var(--yellow);">Weight up + body fat % up + muscle flat</strong> — surplus too aggressive, mostly fat</span></div>
      <div class="composite-key-row"><span class="composite-key-dot" style="color: var(--red);">⬇</span><span><strong style="color: var(--red);">Strength flat, weight flat or down</strong> — under-eating, not recovering</span></div>
    </div>
    <div class="chart-wrap">
      <div class="chart-title">% change from first entry</div>
      <div class="composite-legend">
        ${haveBW ? `<div class="composite-legend-item"><span class="composite-legend-dot" style="background: #d4a574;"></span>Bodyweight</div>` : ''}
        ${haveBodyFat ? `<div class="composite-legend-item"><span class="composite-legend-dot" style="background: #c46b5b;"></span>Body fat</div>` : ''}
        ${haveMuscle ? `<div class="composite-legend-item"><span class="composite-legend-dot" style="background: #7ca85a;"></span>Muscle</div>` : ''}
        ${haveStrength ? `<div class="composite-legend-item"><span class="composite-legend-dot" style="background: #6b9bc4;"></span>Strength</div>` : ''}
      </div>
      <svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="height: 200px;">
        ${yTicks.map(t => `<line x1="${padL}" x2="${W - padR}" y1="${t.y}" y2="${t.y}" stroke="rgba(255,255,255,0.06)" stroke-dasharray="3 3"/><text x="${padL - 6}" y="${t.y + 3}" fill="rgba(255,255,255,0.4)" font-size="9" text-anchor="end" font-family="JetBrains Mono, monospace">${t.v >= 0 ? '+' : ''}${t.v}%</text>`).join('')}
        <line x1="${padL}" x2="${W - padR}" y1="${zeroY}" y2="${zeroY}" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
        ${haveBW ? `<path d="${makePath(bwPts)}" fill="none" stroke="#d4a574" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>${dotsFor(bwPts, '#d4a574')}` : ''}
        ${haveBodyFat ? `<path d="${makePath(bodyFatPts)}" fill="none" stroke="#c46b5b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>${dotsFor(bodyFatPts, '#c46b5b')}` : ''}
        ${haveMuscle ? `<path d="${makePath(musclePts)}" fill="none" stroke="#7ca85a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>${dotsFor(musclePts, '#7ca85a')}` : ''}
        ${haveStrength ? `<path d="${makePath(strengthPts)}" fill="none" stroke="#6b9bc4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>${dotsFor(strengthPts, '#6b9bc4')}` : ''}
        ${xLabels.map(l => `<text x="${l.x}" y="${H - 6}" fill="rgba(255,255,255,0.4)" font-size="9" text-anchor="middle" font-family="JetBrains Mono, monospace">${l.label}</text>`).join('')}
      </svg>
    </div>
  `;
}

function renderKneeChart(kneeData) {
  const W = 320, H = 180, padL = 28, padR = 8, padT = 14, padB = 22;
  const xStep = kneeData.length > 1 ? (W - padL - padR) / (kneeData.length - 1) : 0;
  const xy = kneeData.map((p, i) => {
    const x = padL + i * xStep;
    const y = padT + (H - padT - padB) * (1 - p.pain / 10);
    return [x, y, p];
  });
  const path = xy.map(([x, y], i) => `${i === 0 ? 'M' : 'L'} ${x} ${y}`).join(' ');
  const cautionY = padT + (H - padT - padB) * (1 - 3 / 10);
  let xLabels = '';
  if (kneeData.length <= 5) {
    xLabels = xy.map(([x, , p]) => `<text x="${x}" y="${H - 6}" fill="rgba(255,255,255,0.4)" font-size="9" text-anchor="middle" font-family="JetBrains Mono, monospace">${p.dateLabel}</text>`).join('');
  } else {
    [0, Math.floor(kneeData.length / 2), kneeData.length - 1].forEach(i => {
      const [x, , p] = xy[i];
      xLabels += `<text x="${x}" y="${H - 6}" fill="rgba(255,255,255,0.4)" font-size="9" text-anchor="middle" font-family="JetBrains Mono, monospace">${p.dateLabel}</text>`;
    });
  }
  return `
    <div class="chart-wrap">
      <div class="chart-title">Knee pain over time (0–10)</div>
      <svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">
        ${[0, 5, 10].map(v => {
          const y = padT + (H - padT - padB) * (1 - v / 10);
          return `<line x1="${padL}" x2="${W - padR}" y1="${y}" y2="${y}" stroke="rgba(255,255,255,0.06)" stroke-dasharray="3 3"/><text x="${padL - 6}" y="${y + 3}" fill="rgba(255,255,255,0.4)" font-size="9" text-anchor="end" font-family="JetBrains Mono, monospace">${v}</text>`;
        }).join('')}
        <line x1="${padL}" x2="${W - padR}" y1="${cautionY}" y2="${cautionY}" stroke="rgba(220, 100, 80, 0.5)" stroke-dasharray="3 3"/>
        <text x="${W - padR - 4}" y="${cautionY - 3}" fill="rgba(220,100,80,0.7)" font-size="9" text-anchor="end" font-family="JetBrains Mono, monospace">caution (3/10)</text>
        <path d="${path}" fill="none" stroke="#c98a6b" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        ${xy.map(([x, y]) => `<circle cx="${x}" cy="${y}" r="3.5" fill="#c98a6b"/>`).join('')}
        ${xLabels}
      </svg>
    </div>
  `;
}

function renderBody() {
  const lastBW = getLastBodyweight();
  const lastWaist = getLastWaist();
  const lastComp = getLastComposition();
  const waistDays = daysSinceLastWaist();
  const isWaistOverdue = isWaistDue();
  const compDays = lastComp ? Math.floor((Date.now() - new Date(lastComp.date).getTime()) / 86400000) : null;

  // Sort logs newest first for display
  const bwList = [...(data.bodyweightLog || [])].sort((a, b) => new Date(b.date) - new Date(a.date));
  const waistList = [...(data.waistLog || [])].sort((a, b) => new Date(b.date) - new Date(a.date));
  const compList = [...(data.compositionLog || [])].sort((a, b) => new Date(b.date) - new Date(a.date));

  // Sort oldest first for charts
  const bwChartData = [...(data.bodyweightLog || [])]
    .sort((a, b) => new Date(a.date) - new Date(b.date))
    .map(e => ({ date: e.date, dateLabel: fmtDateShort(e.date), weight: e.value }));
  const waistChartData = [...(data.waistLog || [])]
    .sort((a, b) => new Date(a.date) - new Date(b.date))
    .map(e => ({ date: e.date, dateLabel: fmtDateShort(e.date), waist: e.value }));
  const compSorted = [...(data.compositionLog || [])].sort((a, b) => new Date(a.date) - new Date(b.date));
  const bodyFatChart = compSorted.filter(e => e.bodyFat != null).map(e => ({ date: e.date, dateLabel: fmtDateShort(e.date), bodyFat: e.bodyFat }));
  const visceralChart = compSorted.filter(e => e.visceralFat != null).map(e => ({ date: e.date, dateLabel: fmtDateShort(e.date), visceralFat: e.visceralFat }));
  const muscleChart = compSorted.filter(e => e.musclePct != null).map(e => ({ date: e.date, dateLabel: fmtDateShort(e.date), musclePct: e.musclePct }));
  const bmiChart = compSorted.filter(e => e.bmi != null).map(e => ({ date: e.date, dateLabel: fmtDateShort(e.date), bmi: e.bmi }));

  return `
    <div class="view">
      ${topbar('Body', 'Track your weight, waist, and scale readings')}

      <!-- BODYWEIGHT CARD -->
      <div class="body-card">
        <div class="body-card-head">
          <div class="body-card-title">Bodyweight</div>
          <span class="body-cadence-pill">weekly</span>
          <button class="body-info-btn" data-action="show-bodyweight-info" aria-label="How to measure">${I.info(16)}</button>
        </div>
        ${lastBW
          ? `<div class="body-card-current">${lastBW.value}<span class="unit">lbs</span></div>
             <div class="body-card-meta">Last: ${fmtDate(lastBW.date)} · ${daysAgo(lastBW.date)}</div>`
          : `<div class="body-card-meta">No entries yet</div>`
        }
        <div class="body-card-input">
          <input type="number" inputmode="decimal" step="any" id="bw-input" placeholder="${lastBW ? lastBW.value : 'lbs'}">
          <button data-action="log-bodyweight">Log</button>
        </div>
      </div>

      <!-- SCALE COMPOSITION CARD -->
      <div class="body-card">
        <div class="body-card-head">
          <div class="body-card-title">Scale composition</div>
          <span class="body-cadence-pill">weekly</span>
          <button class="body-info-btn" data-action="show-composition-info" aria-label="How to measure">${I.info(16)}</button>
        </div>
        ${lastComp ? `
          <div class="comp-grid">
            ${lastComp.bodyFat != null ? `<div class="comp-cell"><div class="comp-cell-val">${lastComp.bodyFat}<span class="unit">%</span></div><div class="comp-cell-label">body fat</div></div>` : ''}
            ${lastComp.musclePct != null ? `<div class="comp-cell"><div class="comp-cell-val">${lastComp.musclePct}<span class="unit">%</span></div><div class="comp-cell-label">muscle</div></div>` : ''}
            ${lastComp.visceralFat != null ? `<div class="comp-cell"><div class="comp-cell-val">${lastComp.visceralFat}</div><div class="comp-cell-label">visceral</div></div>` : ''}
            ${lastComp.bmi != null ? `<div class="comp-cell"><div class="comp-cell-val">${lastComp.bmi}</div><div class="comp-cell-label">BMI</div></div>` : ''}
          </div>
          <div class="body-card-meta">Last: ${fmtDate(lastComp.date)} · ${daysAgo(lastComp.date)}</div>
        ` : `<div class="body-card-meta">No entries yet — tap the info icon for how to use your scale</div>`}

        <div class="comp-inputs">
          <div class="comp-input-row">
            <label class="comp-input-label">Body fat %</label>
            <input type="number" inputmode="decimal" step="any" id="comp-bodyfat" placeholder="${lastComp?.bodyFat ?? '—'}">
          </div>
          <div class="comp-input-row">
            <label class="comp-input-label">Muscle %</label>
            <input type="number" inputmode="decimal" step="any" id="comp-muscle" placeholder="${lastComp?.musclePct ?? '—'}">
          </div>
          <div class="comp-input-row">
            <label class="comp-input-label">Visceral fat</label>
            <input type="number" inputmode="decimal" step="any" id="comp-visceral" placeholder="${lastComp?.visceralFat ?? '—'}">

            <input type="number" inputmode="decimal" step="any" id="comp-bmi" placeholder="${lastComp?.bmi ?? '—'}">
          </div>

      </div>

        <div class="body-card-head">
          <div class="body-card-title">Waist</div>
          <span class="body-cadence-pill">biweekly</span>
          <button class="body-info-btn" data-action="show-waist-info" aria-label="How to measure">${I.info(16)}</button>
        </div>
        ${lastWaist
          ? `<div class="body-card-current">${lastWaist.value}<span class="unit">in</span></div>
             <div class="body-card-meta ${isWaistOverdue ? 'due' : ''}">Last: ${fmtDate(lastWaist.date)} · ${waistDays} day${waistDays === 1 ? '' : 's'} ago${isWaistOverdue ? ' · due now' : ''}</div>`

        <div class="body-card-input">
          <input type="number" inputmode="decimal" step="any" id="waist-input" placeholder="${lastWaist ? lastWaist.value : 'inches'}">
          <button data-action="log-waist">Log</button>
        </div>
      </div>

      <!-- CHARTS -->
      ${bwChartData.length >= 2 ? `
        <h2 class="section-h">Bodyweight trend</h2>
        ${renderLineChart('Weight (lbs)', bwChartData, 'weight', 'lb', '#d4a574')}
      ` : ''}

      ${bodyFatChart.length >= 2 ? `
        <h2 class="section-h">Body fat trend</h2>
        ${renderLineChart('Body fat %', bodyFatChart, 'bodyFat', '%', '#c46b5b')}
      ` : ''}

      ${muscleChart.length >= 2 ? `
        <h2 class="section-h">Muscle trend</h2>
        ${renderLineChart('Muscle %', muscleChart, 'musclePct', '%', '#7ca85a')}
      ` : ''}

      ${visceralChart.length >= 2 ? `
        <h2 class="section-h">Visceral fat trend</h2>
        ${renderLineChart('Visceral fat', visceralChart, 'visceralFat', '', '#d4b554')}
      ` : ''}

      ${bmiChart.length >= 2 ? `
        <h2 class="section-h">BMI trend</h2>
        ${renderLineChart('BMI', bmiChart, 'bmi', '', '#b5a896')}
      ` : ''}

      ${waistChartData.length >= 2 ? `
        <h2 class="section-h">Waist trend</h2>
        ${renderLineChart('Waist (inches)', waistChartData, 'waist', 'in', '#c98a6b')}
      ` : ''}

      <!-- LOGS -->
      ${bwList.length > 0 ? `
        <h2 class="section-h">Bodyweight log</h2>
        <div class="body-log-list">
          ${bwList.map(e => `
            <div class="body-log-row">
              <span class="body-log-date">${fmtDate(e.date)}</span>
              <span><span class="body-log-value">${e.value} lb</span><button class="delete-btn" data-action="delete-bw-entry" data-entry-id="${e.id}" aria-label="Delete">${I.trash(12)}</button></span>
            </div>
          `).join('')}
        </div>
      ` : ''}

      ${compList.length > 0 ? `
        <h2 class="section-h">Composition log</h2>
        <div class="body-log-list">
          ${compList.map(e => {
            const parts = [];
            if (e.bodyFat != null) parts.push(`${e.bodyFat}% fat`);
            if (e.musclePct != null) parts.push(`${e.musclePct}% muscle`);
            if (e.visceralFat != null) parts.push(`V${e.visceralFat}`);
            if (e.bmi != null) parts.push(`BMI ${e.bmi}`);
            return `
              <div class="body-log-row">
                <span class="body-log-date">${fmtDate(e.date)}</span>
                <span><span class="body-log-value">${parts.join(' · ')}</span><button class="delete-btn" data-action="delete-comp-entry" data-entry-id="${e.id}" aria-label="Delete">${I.trash(12)}</button></span>
              </div>
            `;
          }).join('')}
        </div>
      ` : ''}

      ${waistList.length > 0 ? `
        <h2 class="section-h">Waist log</h2>
        <div class="body-log-list">

    </div>
  `;
}

// ============================================================
// SHARED COMPONENTS
// ============================================================
function topbar(title, subtitle, actions = []) {
  return `
    <div class="topbar">
      <button class="back-btn" data-action="back">${I.chevL()}</button>
      <div class="topbar-text">
        <div class="topbar-title">${title}</div>
        ${subtitle ? `<div class="topbar-subtitle">${subtitle}</div>` : ''}
      </div>
      <div class="topbar-actions">
        ${actions.map(a => `<button class="topbar-action" data-action="${a.action}" aria-label="${a.label}">${a.icon}</button>`).join('')}
      </div>
    </div>
  `;
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function truncate(s, n) {
  if (!s) return '';
  return s.length > n ? s.slice(0, n - 1) + '…' : s;
}

// ============================================================
// MODAL SYSTEM
// ============================================================
function openModal(html) {
  closeModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal" onclick="event.stopPropagation()">${html}</div>`;
  overlay.addEventListener('click', closeModal);
  document.body.appendChild(overlay);
  attachModalHandlers();
}

function closeModal() {
  document.querySelectorAll('.modal-overlay').forEach(o => o.remove());
}

function attachModalHandlers() {
  document.querySelectorAll('.modal [data-modal-action]').forEach(el => {
    el.addEventListener('click', e => {
      const action = el.dataset.modalAction;
      handleModalAction(action, el);
    });
  });
  document.querySelectorAll('.modal .pain-btn').forEach(el => {
    el.addEventListener('click', e => {
      const val = parseInt(el.dataset.val);
      document.querySelectorAll('.modal .pain-btn').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      const tier = val <= 2 ? 'pain-low' : val <= 5 ? 'pain-mid' : 'pain-high';
      el.classList.remove('pain-low', 'pain-mid', 'pain-high');
      el.classList.add(tier);
      const hidden = document.querySelector('.modal [data-knee-val]');
      if (hidden) hidden.value = val;
    });
  });
}

function handleModalAction(action, el) {
  // Block create / edit
  if (action === 'create-block-confirm') {
    const name = document.querySelector('.modal [data-bind="name"]').value.trim();
    const weeks = document.querySelector('.modal [data-bind="weeks"]').value.trim();
    if (!name) { showToast('Block needs a name'); return; }
    const newBlock = {
      id: uid('b'),
      name,
      weeksLabel: weeks,
      days: [{ id: uid('d'), name: 'Day 1', subtitle: '', exercises: [] }],
    };
    data.blocks.push(newBlock);
    if (!data.activeBlockId) data.activeBlockId = newBlock.id;
    persist();
    closeModal();
    navigate('block-edit', { blockId: newBlock.id });
  }
  if (action === 'edit-block-meta-confirm') {
    const block = data.blocks.find(b => b.id === el.dataset.blockId);
    if (!block) return;
    block.name = document.querySelector('.modal [data-bind="name"]').value.trim() || block.name;
    block.weeksLabel = document.querySelector('.modal [data-bind="weeks"]').value.trim();
    persist();
    closeModal();
    render();
  }
  if (action === 'edit-day-confirm') {
    const { blockId, dayId } = el.dataset;
    const block = data.blocks.find(b => b.id === blockId);
    const day = block?.days.find(d => d.id === dayId);
    if (!day) return;
    day.name = document.querySelector('.modal [data-bind="name"]').value.trim() || day.name;
    day.subtitle = document.querySelector('.modal [data-bind="subtitle"]').value.trim();
    persist();
    closeModal();
    render();
  }
  if (action === 'add-day-confirm') {
    const block = data.blocks.find(b => b.id === el.dataset.blockId);
    if (!block) return;
    const name = document.querySelector('.modal [data-bind="name"]').value.trim();
    const subtitle = document.querySelector('.modal [data-bind="subtitle"]').value.trim();
    if (!name) { showToast('Day needs a name'); return; }
    const newDay = { id: uid('d'), name, subtitle, exercises: [] };
    block.days.push(newDay);
    persist();
    closeModal();
    navigate('block-edit', { blockId: block.id, dayId: newDay.id });
  }
  if (action === 'finish-session-confirm') {
    const session = data.sessions.find(s => s.id === route.params.sessionId);
    if (!session) return;
    const kneeEl = document.querySelector('.modal [data-knee-val]');
    const sleepEl = document.querySelector('.modal [data-bind="sleep"]');
    const notesEl = document.querySelector('.modal [data-bind="notes"]');
    session.kneePain = kneeEl?.value ? parseInt(kneeEl.value) : null;
    session.sleepHours = sleepEl?.value ? parseFloat(sleepEl.value) : null;
    session.notes = notesEl?.value || '';
    session.completed = true;
    persist();
    closeModal();
    showToast('Session logged ✓');
    navigate('home');
  }
  if (action === 'progress-picker-select') {
    closeModal();
    navigate('progress', { exId: el.dataset.exId });
  }
  if (action === 'import-confirm') {
    const txt = document.querySelector('.modal [data-bind="import-text"]').value.trim();
    try {
      const parsed = JSON.parse(txt);
      if (!parsed.blocks || !parsed.sessions) throw new Error('Invalid format');
      data = parsed;
      if (!data.phases) data.phases = DEFAULT_PHASES;
      if (!data.collapsedSections) data.collapsedSections = {};
      persist();
      closeModal();
      showToast('Imported successfully');
      navigate('home');
    } catch (e) {
      showToast('Invalid data — could not import');
    }
  }
}

// ============================================================
// EVENT HANDLERS
// ============================================================
function attachHandlers() {
  // Generic action buttons
  document.querySelectorAll('[data-action]').forEach(el => {
    // Avoid double-binding (data-action elements inside modals are handled separately)
    if (el.closest('.modal-overlay')) return;
    el.addEventListener('click', e => {
      const action = el.dataset.action;
      handleAction(action, el, e);
    });
    // For form inputs (date, select, etc.), also bind change since they don't reliably fire click
    const tag = el.tagName;
    if (tag === 'INPUT' || tag === 'SELECT' || tag === 'TEXTAREA') {
      el.addEventListener('change', e => {
        const action = el.dataset.action;
        handleAction(action, el, e);
      });
    }
  });
  // Set inputs
  document.querySelectorAll('[data-set-input]').forEach(el => {
    el.addEventListener('input', e => {
      const idx = parseInt(el.dataset.idx);
      const field = el.dataset.field;
      const subIdx = el.dataset.subIdx != null ? parseInt(el.dataset.subIdx) : null;
      if (subIdx != null && route.params.workingSubSets) {
        if (!route.params.workingSubSets[subIdx]) route.params.workingSubSets[subIdx] = [];
        if (!route.params.workingSubSets[subIdx][idx]) route.params.workingSubSets[subIdx][idx] = {};
        route.params.workingSubSets[subIdx][idx][field] = el.value;
      } else if (route.params.workingSets) {
        route.params.workingSets[idx][field] = el.value;
      }
    });
  });
  // Form bindings (for exercise-edit page)
  document.querySelectorAll('[data-bind]').forEach(el => {
    if (el.closest('.modal-overlay')) return;
    el.addEventListener('input', e => {
      const field = el.dataset.bind;
      if (route.params.draft && route.view === 'exercise-edit') {
        route.params.draft[field] = el.value;
      }
    });
    el.addEventListener('change', e => {
      const field = el.dataset.bind;
      if (route.params.draft && route.view === 'exercise-edit') {
        route.params.draft[field] = el.value;
        // Re-render if type changed to show/hide sub-exercise fields
        if (field === 'type') render();
      }
    });
  });
  // Sub-exercise form bindings
  document.querySelectorAll('[data-bind-sub]').forEach(el => {
    if (el.closest('.modal-overlay')) return;
    const handler = e => {
      const subIdx = parseInt(el.dataset.bindSub);
      const field = el.dataset.subField;
      if (route.params.draft && route.view === 'exercise-edit') {
        if (!route.params.draft.subExercises) route.params.draft.subExercises = [];
        if (!route.params.draft.subExercises[subIdx]) route.params.draft.subExercises[subIdx] = { name: '', type: 'weight' };
        route.params.draft.subExercises[subIdx][field] = el.value;
      }
    };
    el.addEventListener('input', handler);
    el.addEventListener('change', handler);
  });
  // Checkbox bindings (boolean flags on draft, like compositeChart)
  document.querySelectorAll('[data-bind-checkbox]').forEach(el => {
    if (el.closest('.modal-overlay')) return;
    el.addEventListener('change', e => {
      const field = el.dataset.bindCheckbox;
      if (route.params.draft && route.view === 'exercise-edit') {
        route.params.draft[field] = el.checked;
      }
    });
  });
  // Info section collapse persistence
  document.querySelectorAll('.info-section[data-collapse-key]').forEach(el => {
    el.addEventListener('toggle', e => {
      const key = el.dataset.collapseKey;
      if (el.open) delete data.collapsedSections[key];
      else data.collapsedSections[key] = true;
      persist();
    });
  });
}

function handleAction(action, el, e) {
  switch (action) {
    case 'back': handleBack(); break;
    case 'goto-settings': navigate('settings'); break;
    case 'goto-phases': navigate('phases'); break;
    case 'goto-blocks': navigate('blocks'); break;
    case 'goto-history': navigate('history'); break;
    case 'goto-progress': navigate('progress', { exId: el.dataset.exId }); break;
    case 'quickstart': handleQuickstart(); break;
    case 'create-block': handleCreateBlock(); break;
    case 'activate-block': handleActivateBlock(el.dataset.blockId); break;
    case 'delete-block': handleDeleteBlock(el.dataset.blockId); break;
    case 'edit-block': navigate('block-edit', { blockId: el.dataset.blockId }); break;
    case 'edit-block-meta': handleEditBlockMeta(el.dataset.blockId); break;
    case 'select-day': navigate('block-edit', { blockId: el.dataset.blockId, dayId: el.dataset.dayId }); break;
    case 'add-day': handleAddDay(el.dataset.blockId); break;
    case 'edit-day': handleEditDay(el.dataset.blockId, el.dataset.dayId); break;
    case 'delete-day': handleDeleteDay(el.dataset.blockId, el.dataset.dayId); break;
    case 'add-exercise': navigate('exercise-edit', { blockId: el.dataset.blockId, dayId: el.dataset.dayId, isNew: true, draft: null }); break;
    case 'edit-exercise': navigate('exercise-edit', { blockId: el.dataset.blockId, dayId: el.dataset.dayId, exId: el.dataset.exId, isNew: false, draft: null }); break;
    case 'delete-exercise': handleDeleteExercise(el.dataset.blockId, el.dataset.dayId, el.dataset.exId); break;
    case 'move-ex': handleMoveExercise(el.dataset.blockId, el.dataset.dayId, el.dataset.exId, el.dataset.dir); break;
    case 'cancel-edit': handleBack(); break;
    case 'save-exercise': handleSaveExercise(el.dataset.blockId, el.dataset.dayId, el.dataset.isNew === '1'); break;
    case 'start-session': handleStartSession(el.dataset.dayId); break;
    case 'open-exercise': navigate('exercise', { sessionId: route.params.sessionId, exId: el.dataset.exId, workingSets: null, workingSubSets: null }); break;
    case 'add-set': handleAddSet(); break;
    case 'remove-set': handleRemoveSet(parseInt(el.dataset.idx)); break;
    case 'save-sets': handleSaveSets(el.dataset.exId); break;
    case 'add-sub-set': handleAddSubSet(parseInt(el.dataset.subIdx)); break;
    case 'remove-sub-set': handleRemoveSubSet(parseInt(el.dataset.subIdx), parseInt(el.dataset.idx)); break;
    case 'save-superset': handleSaveSuperset(el.dataset.exId); break;
    case 'finish-session': handleFinishSession(); break;
    case 'delete-session': handleDeleteSession(el.dataset.sessionId); break;
    case 'open-progress-picker': handleOpenProgressPicker(); break;
    case 'set-start-date': handleSetStartDate(el.value); break;
    case 'export-data': handleExport(); break;
    case 'copy-data': handleCopy(); break;
    case 'import-data': handleImport(); break;
    case 'reset-all': handleResetAll(); break;
    case 'goto-body': navigate('body'); break;
    case 'dismiss-waist-banner': handleDismissWaistBanner(e); break;
    case 'show-bodyweight-info': handleShowBodyweightInfo(); break;
    case 'show-waist-info': handleShowWaistInfo(); break;
    case 'show-composition-info': handleShowCompositionInfo(); break;
    case 'log-bodyweight': handleLogBodyweight(); break;
    case 'log-waist': handleLogWaist(); break;
    case 'log-composition': handleLogComposition(); break;
    case 'delete-bw-entry': handleDeleteBwEntry(el.dataset.entryId); break;
    case 'delete-waist-entry': handleDeleteWaistEntry(el.dataset.entryId); break;
    case 'delete-comp-entry': handleDeleteCompEntry(el.dataset.entryId); break;
  }
}

function handleBack() {
  // Simple back logic: based on current view
  switch (route.view) {
    case 'home': break; // no back
    case 'session': navigate('home'); break;
    case 'exercise':
      if (route.params.sessionId) navigate('session', { sessionId: route.params.sessionId });
      else navigate('home');
      break;
    case 'exercise-edit':
      navigate('block-edit', { blockId: route.params.blockId, dayId: route.params.dayId });
      break;
    case 'block-edit': navigate('blocks'); break;
    case 'blocks': navigate('home'); break;
    case 'phases': navigate('home'); break;
    case 'progress':
      if (route.params.sessionId) navigate('session', { sessionId: route.params.sessionId });
      else navigate('history');
      break;
    case 'history': navigate('home'); break;
    case 'settings': navigate('home'); break;
    case 'body': navigate('home'); break;
    default: navigate('home');
  }
}

function handleQuickstart() {
  if (!confirm('This will create "Block 1 — Weeks 1–8" with all 21 exercises from your plan, pre-filled with target muscles, goal alignment, progression, and rotation notes. Continue?')) return;
  const block = makePresetBlock1();
  data.blocks.push(block);
  data.activeBlockId = block.id;
  persist();
  showToast('Block created ✓');
  navigate('home');
}

function handleCreateBlock() {
  openModal(`
    <h3>New training block</h3>
    <label class="field">
      <span>Block name</span>
      <input type="text" data-bind="name" placeholder="e.g., Block 2 — Weeks 9–16" autofocus>
    </label>
    <label class="field">
      <span>Weeks label (optional)</span>
      <input type="text" data-bind="weeks" placeholder="e.g., Wk 9–16">
    </label>
    <div class="modal-actions">
      <button class="secondary-btn" onclick="document.querySelectorAll('.modal-overlay').forEach(o => o.remove())">Cancel</button>
      <button class="primary-btn" data-modal-action="create-block-confirm">Create</button>
    </div>
  `);
}

function handleEditBlockMeta(blockId) {
  const block = data.blocks.find(b => b.id === blockId);
  if (!block) return;
  openModal(`
    <h3>Edit block</h3>
    <label class="field">
      <span>Block name</span>
      <input type="text" data-bind="name" value="${escapeHtml(block.name)}" autofocus>
    </label>
    <label class="field">
      <span>Weeks label</span>
      <input type="text" data-bind="weeks" value="${escapeHtml(block.weeksLabel || '')}">
    </label>
    <div class="modal-actions">
      <button class="secondary-btn" onclick="document.querySelectorAll('.modal-overlay').forEach(o => o.remove())">Cancel</button>
      <button class="primary-btn" data-modal-action="edit-block-meta-confirm" data-block-id="${blockId}">Save</button>
    </div>
  `);
}

function handleActivateBlock(blockId) {
  data.activeBlockId = blockId;
  persist();
  showToast('Block activated');
  render();
}

function handleDeleteBlock(blockId) {
  if (!confirm('Delete this block? Sessions logged for it will remain in history but the block itself will be gone.')) return;
  data.blocks = data.blocks.filter(b => b.id !== blockId);
  if (data.activeBlockId === blockId) {
    data.activeBlockId = data.blocks[0]?.id || null;
  }
  persist();
  showToast('Block deleted');
  render();
}

function handleAddDay(blockId) {
  openModal(`
    <h3>Add training day</h3>
    <label class="field">
      <span>Day name</span>
      <input type="text" data-bind="name" placeholder="e.g., Day 4 — Mobility" autofocus>
    </label>
    <label class="field">
      <span>Subtitle / focus (optional)</span>
      <input type="text" data-bind="subtitle" placeholder="e.g., Active recovery">
    </label>
    <div class="modal-actions">
      <button class="secondary-btn" onclick="document.querySelectorAll('.modal-overlay').forEach(o => o.remove())">Cancel</button>
      <button class="primary-btn" data-modal-action="add-day-confirm" data-block-id="${blockId}">Add</button>
    </div>
  `);
}

function handleEditDay(blockId, dayId) {
  const block = data.blocks.find(b => b.id === blockId);
  const day = block?.days.find(d => d.id === dayId);
  if (!day) return;
  openModal(`
    <h3>Edit day</h3>
    <label class="field">
      <span>Day name</span>
      <input type="text" data-bind="name" value="${escapeHtml(day.name)}" autofocus>
    </label>
    <label class="field">
      <span>Subtitle / focus</span>
      <input type="text" data-bind="subtitle" value="${escapeHtml(day.subtitle || '')}">
    </label>
    <div class="modal-actions">
      <button class="secondary-btn" onclick="document.querySelectorAll('.modal-overlay').forEach(o => o.remove())">Cancel</button>
      <button class="primary-btn" data-modal-action="edit-day-confirm" data-block-id="${blockId}" data-day-id="${dayId}">Save</button>
    </div>
  `);
}

function handleDeleteDay(blockId, dayId) {
  if (!confirm('Delete this day and all its exercises?')) return;
  const block = data.blocks.find(b => b.id === blockId);
  if (!block) return;
  block.days = block.days.filter(d => d.id !== dayId);
  persist();
  showToast('Day deleted');
  navigate('block-edit', { blockId });
}

function handleDeleteExercise(blockId, dayId, exId) {
  if (!confirm('Delete this exercise?')) return;
  const block = data.blocks.find(b => b.id === blockId);
  const day = block?.days.find(d => d.id === dayId);
  if (!day) return;
  day.exercises = day.exercises.filter(e => e.id !== exId);
  persist();
  render();
}

function handleMoveExercise(blockId, dayId, exId, dir) {
  const block = data.blocks.find(b => b.id === blockId);
  const day = block?.days.find(d => d.id === dayId);
  if (!day) return;
  const idx = day.exercises.findIndex(e => e.id === exId);
  if (idx < 0) return;
  const newIdx = dir === 'up' ? idx - 1 : idx + 1;
  if (newIdx < 0 || newIdx >= day.exercises.length) return;
  const [moved] = day.exercises.splice(idx, 1);
  day.exercises.splice(newIdx, 0, moved);
  persist();
  render();
}

function handleSaveExercise(blockId, dayId, isNew) {
  const draft = route.params.draft;
  if (!draft || !draft.name?.trim()) { showToast('Exercise needs a name'); return; }
  const block = data.blocks.find(b => b.id === blockId);
  const day = block?.days.find(d => d.id === dayId);
  if (!day) return;
  if (isNew) {
    day.exercises.push(draft);
  } else {
    const idx = day.exercises.findIndex(e => e.id === draft.id);
    if (idx >= 0) day.exercises[idx] = draft;
  }
  persist();
  showToast('Saved ✓');
  navigate('block-edit', { blockId, dayId });
}

function handleStartSession(dayId) {
  const activeBlock = getActiveBlock(data);
  if (!activeBlock) return;
  // Look for existing draft session for today + day
  const todayStr = new Date().toISOString().slice(0, 10);
  let session = data.sessions.find(s => !s.completed && s.dayId === dayId && s.date.slice(0, 10) === todayStr);
  if (!session) {
    session = {
      id: uid('s'),
      blockId: activeBlock.id,
      dayId,
      date: new Date().toISOString(),
      entries: {},
      kneePain: null,
      sleepHours: null,
      notes: '',
      completed: false,
    };
    data.sessions.push(session);
    persist();
  }
  navigate('session', { sessionId: session.id });
}

function handleAddSet() {
  if (!route.params.workingSets) return;
  const { sessionId, exId } = route.params;
  const session = data.sessions.find(s => s.id === sessionId);
  const block = data.blocks.find(b => b.id === session.blockId);
  const day = block?.days.find(d => d.id === session.dayId);
  const ex = day?.exercises.find(e => e.id === exId);
  if (!ex) return;
  route.params.workingSets.push(emptySet(ex.type));
  render();
}

function handleRemoveSet(idx) {
  if (!route.params.workingSets || route.params.workingSets.length <= 1) return;
  route.params.workingSets.splice(idx, 1);
  render();
}

function handleSaveSets(exId) {
  const { sessionId } = route.params;
  const session = data.sessions.find(s => s.id === sessionId);
  if (!session) return;
  const raw = route.params.workingSets || [];
  const clean = raw
    .filter(s => Object.values(s).some(v => v !== '' && v !== null && v !== undefined))
    .map(s => {
      const out = {};
      for (const [k, v] of Object.entries(s)) {
        if (v === '' || v === null || v === undefined) {
          out[k] = null;
        } else {
          const n = parseFloat(v);
          out[k] = isNaN(n) ? v : n;
        }
      }
      return out;
    });
  if (!session.entries) session.entries = {};
  session.entries[exId] = { sets: clean };
  persist();
  showToast('Saved ✓');
  navigate('session', { sessionId });
}

function handleAddSubSet(subIdx) {
  if (!route.params.workingSubSets) return;
  const { sessionId, exId } = route.params;
  const session = data.sessions.find(s => s.id === sessionId);
  const block = data.blocks.find(b => b.id === session.blockId);
  const day = block?.days.find(d => d.id === session.dayId);
  const ex = day?.exercises.find(e => e.id === exId);
  if (!ex || !isSuperset(ex)) return;
  if (!route.params.workingSubSets[subIdx]) route.params.workingSubSets[subIdx] = [];
  route.params.workingSubSets[subIdx].push(emptySet(ex.subExercises[subIdx].type || 'weight'));
  render();
}

function handleRemoveSubSet(subIdx, idx) {
  if (!route.params.workingSubSets) return;
  const arr = route.params.workingSubSets[subIdx];
  if (!arr || arr.length <= 1) return;
  arr.splice(idx, 1);
  render();
}

function handleSaveSuperset(exId) {
  const { sessionId } = route.params;
  const session = data.sessions.find(s => s.id === sessionId);
  if (!session) return;
  const raw = route.params.workingSubSets || {};
  const cleanSubSets = {};
  for (const [subIdx, sets] of Object.entries(raw)) {
    const clean = sets
      .filter(s => Object.values(s).some(v => v !== '' && v !== null && v !== undefined))
      .map(s => {
        const out = {};
        for (const [k, v] of Object.entries(s)) {
          if (v === '' || v === null || v === undefined) {
            out[k] = null;
          } else {
            const n = parseFloat(v);
            out[k] = isNaN(n) ? v : n;
          }
        }
        return out;
      });
    cleanSubSets[subIdx] = clean;
  }
  if (!session.entries) session.entries = {};
  // Save as superset entry (subSets), drop any legacy `sets` field
  session.entries[exId] = { subSets: cleanSubSets };
  persist();
  showToast('Saved ✓');
  navigate('session', { sessionId });
}

function handleFinishSession() {
  const session = data.sessions.find(s => s.id === route.params.sessionId);

}

  data.bodyweightLog.push({
    id: uid('bw'),

}

function handleLogComposition() {
  const bf = parseFloat(document.getElementById('comp-bodyfat')?.value);
  const muscle = parseFloat(document.getElementById('comp-muscle')?.value);
  const visceral = parseFloat(document.getElementById('comp-visceral')?.value);
  const bmi = parseFloat(document.getElementById('comp-bmi')?.value);

  const entry = {
    id: uid('comp'),
    date: new Date().toISOString(),
    bodyFat: !isNaN(bf) && bf > 0 && bf < 80 ? bf : null,
    musclePct: !isNaN(muscle) && muscle > 0 && muscle < 100 ? muscle : null,
    visceralFat: !isNaN(visceral) && visceral >= 0 && visceral < 100 ? visceral : null,
    bmi: !isNaN(bmi) && bmi > 5 && bmi < 100 ? bmi : null,
  };

  // Need at least one valid value
  if (entry.bodyFat == null && entry.musclePct == null && entry.visceralFat == null && entry.bmi == null) {
    showToast('Enter at least one valid value');
    return;
  }

  if (!data.compositionLog) data.compositionLog = [];
  data.compositionLog.push(entry);
  persist();
  showToast('Composition logged ✓');
  render();
}

function handleDeleteCompEntry(entryId) {
  if (!confirm('Delete this composition entry?')) return;
  data.compositionLog = (data.compositionLog || []).filter(e => e.id !== entryId);
  persist();
  render();
}

function handleExport() {
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const ts = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `training-log-${ts}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 100);
  showToast('Exported');
}

function handleCopy() {
  const text = JSON.stringify(data, null, 2);
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard')).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); showToast('Copied to clipboard'); } catch (e) { showToast('Copy failed'); }
  document.body.removeChild(ta);
}

function handleImport() {
  openModal(`
    <h3>Import data</h3>
    <p style="font-size: 12.5px; color: var(--text-2); margin-bottom: 12px;">Paste your previously exported JSON below. This will overwrite all current data.</p>

      <span>Paste JSON</span>
      <textarea data-bind="import-text" rows="10" placeholder='{"version":1, ...}'></textarea>
    </label>

      <button class="primary-btn" data-modal-action="import-confirm">Import</button>
    </div>
  `);
}

function handleResetAll() {
  if (!confirm('Erase ALL data? This cannot be undone.')) return;
  if (!confirm('Really sure? Every session, every block, gone forever.')) return;
  localStorage.removeItem(STORAGE_KEY);
  data = defaultData();
  showToast('All data reset');
  navigate('home');
}

// ============================================================
// SERVICE WORKER for offline support
// ============================================================
if ('serviceWorker' in navigator) {
  // Register a minimal inline service worker via data URL approach
  const swCode = `
    const CACHE = 'training-log-v1';
    self.addEventListener('install', e => self.skipWaiting());
    self.addEventListener('activate', e => e.waitUntil(self.clients.claim()));
    self.addEventListener('fetch', e => {
      if (e.request.method !== 'GET') return;
      e.respondWith(
        caches.open(CACHE).then(cache =>
          cache.match(e.request).then(cached => {
            const fetchPromise = fetch(e.request).then(networkResponse => {
              if (networkResponse && networkResponse.status === 200 && networkResponse.type === 'basic') {
                cache.put(e.request, networkResponse.clone());
              }
              return networkResponse;
            }).catch(() => cached);
            return cached || fetchPromise;
          })
        )
      );
    });
  `;
  const swBlob = new Blob([swCode], { type: 'application/javascript' });
  const swUrl = URL.createObjectURL(swBlob);
  // Note: Blob URLs for SW only work for the current session, but for GitHub Pages
  // we'll register a separate sw.js file. Try blob first as a fallback.
  navigator.serviceWorker.register('./sw.js').catch(() => {
    // Silent fail — the app still works without offline support
  });
}

// ============================================================
// BOOT
// ============================================================
render();
</script>
